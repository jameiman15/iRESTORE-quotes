function App(){
  const[page,setPage]=useState('quotes');
  const[products,setProducts]=useState([]);
  const[combos,setCombos]=useState([]);
  const[comboModal,setComboModal]=useState(false);
  const[editingCombo,setEditingCombo]=useState(null);
  const[comboForm,setComboForm]=useState({name:'',items:[]});
  const[quotes,setQuotes]=useState([]);
  const[orders,setOrders]=useState([]);
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState('');
  const[quoteModal,setQuoteModal]=useState(false);
  const[orderModal,setOrderModal]=useState(false);
  const[editingQ,setEditingQ]=useState(null);
  const[editingO,setEditingO]=useState(null);
  const[qForm,setQForm]=useState({});
  const[qItems,setQItems]=useState([]);
  const[oForm,setOForm]=useState({});
  const[oItems,setOItems]=useState([]);
  const[selectedItem,setSelectedItem]=useState('');
  const[uploading,setUploading]=useState(false);
  const[batchProgress,setBatchProgress]=useState('');
  const[saving,setSaving]=useState(false);
  const[aiLoading,setAiLoading]=useState(false);
  const[qSearch,setQSearch]=useState('');
  const[qFilter,setQFilter]=useState('');
  const[qSort,setQSort]=useState('newest');
  const[oSearch,setOSearch]=useState('');
  const[prodTab,setProdTab]=useState('products');

  const notify=msg=>setToast(msg);

  useEffect(()=>{loadAll();},[]);

  async function loadAll(){
    setLoading(true);
    try{
      const[qRes,oRes,pRes,cRes]=await Promise.all([
        sb.from('quotes').select('*').order('created_at',{ascending:false}),
        sb.from('orders').select('*').order('created_at',{ascending:false}),
        sb.from('products').select('*').order('sort_order',{ascending:true}),
        sb.from('combos').select('*').order('created_at',{ascending:true}),
      ]);
      if(qRes.data)setQuotes(qRes.data);
      if(oRes.data)setOrders(oRes.data);
      if(pRes.data)setProducts(pRes.data);
      if(cRes.data)setCombos(cRes.data);
    }catch(e){notify('載入失敗');}
    setLoading(false);
  }

  function getProduct(pid){return products.find(p=>p.id===pid)||{};}
  function getComboTotal(c){return c.items.reduce((s,i)=>s+(i.price!=null?i.price:(getProduct(i.pid).price||0))*i.qty,0);}
  function getComboTotalTax(c){return c.items.reduce((s,i)=>s+(i.price_tax!=null?i.price_tax:Math.round((i.price!=null?i.price:(getProduct(i.pid).price||0))*1.05))*i.qty,0);}

  function openNewCombo(){
    setEditingCombo(null);
    setComboForm({name:'',items:[]});
    setComboModal(true);
  }
  function openEditCombo(c){
    setEditingCombo(c);
    setComboForm({name:c.name,items:c.items.map(i=>({...i}))});
    setComboModal(true);
  }
  async function saveCombo(){
    if(!comboForm.name){notify('請填寫組合名稱');return;}
    if(editingCombo){

  async function updateQuoteStatus(id,status){

  async function handlePdfUpload(e,quoteId){
    const file=e.target.files[0];if(!file)return;
    setUploading(true);
    const path=`${quoteId}/${Date.now()}.pdf`;
    const{error}=await sb.storage.from('quotes-pdf').upload(path,file,{upsert:true});
    if(error){notify('上傳失敗：'+error.message);setUploading(false);return;}
    const{data:{publicUrl}}=sb.storage.from('quotes-pdf').getPublicUrl(path);
    await sb.from('quotes').update({pdf_url:publicUrl}).eq('id',quoteId);
    setQuotes(qs=>qs.map(q=>q.id===quoteId?{...q,pdf_url:publicUrl}:q));
    notify('PDF 已上傳 ✓');
    setUploading(false);
    e.target.value='';
  }

  function parseClinicFromFilename(filename){
    const noExt=filename.replace(/\.pdf$/i,'');
    const noDate=noExt.replace(/^\d{4}[_\-]?\d{0,2}[_\-]?\d{0,2}[\s_\-]*/,'');
    const match=noDate.match(/[\u4e00-\u9fff\u3400-\u4dbf]+(?:[\s\u3000]*[\u4e00-\u9fff\u3400-\u4dbf]+)*/);
    return match?match[0].trim():'';
  }

  function parseDateFromFilename(filename){
    const m=filename.match(/(\d{4})[_\-]?(\d{2})[_\-]?(\d{2})/);
    if(m)return`${m[1]}-${m[2]}-${m[3]}`;
    const m2=filename.match(/^(\d{4})\b/);
    if(m2)return`${m2[1]}-01-01`;
    return today();
  }

  async function handleBatchUpload(e){
    const allFiles=Array.from(e.target.files).filter(f=>f.name.toLowerCase().endsWith('.pdf'));
    const files=allFiles.filter(f=>f.name.includes('報價單'));
    if(!files.length){notify(`找不到含「報價單」的 PDF，共掃描 ${allFiles.length} 個`);return;}
    setUploading(true);
    let ok=0,fail=0;
    for(let i=0;i<files.length;i++){
      const file=files[i];
      setBatchProgress(`上傳中 ${i+1}/${files.length}`);
      const clinicName=parseClinicFromFilename(file.name)||'未命名診所';
      const fileDate=parseDateFromFilename(file.name);
      const path=`b${Date.now()}${i}/${Date.now()}.pdf`;
      const{error:upErr}=await sb.storage.from('quotes-pdf').upload(path,file,{upsert:true});
      if(upErr){fail++;continue;}
      const{data:{publicUrl}}=sb.storage.from('quotes-pdf').getPublicUrl(path);
      const{error:dbErr}=await sb.from('quotes').insert({client_name:clinicName,contact:'',phone:'',email:'',address:'',title:clinicName,taxid:'',date:fileDate,notes:file.name.replace(/\.pdf$/i,''),items:[],subtotal:0,tax:0,total:0,status:'pending',pdf_url:publicUrl});
      if(dbErr)fail++;else ok++;
    }
    setBatchProgress('');setUploading(false);
    notify(`批次上傳完成：${ok} 份成功${fail?`，${fail} 份失敗`:''} ✓`);
    await loadAll();
    e.target.value='';
  }

    if(!qForm.client_name){notify('請填寫診所名稱');return;}
    setSaving(true);
    const t=calcTotals(qItems);
    const payload={client_name:qForm.client_name,contact:qForm.contact||'',phone:qForm.phone||'',email:qForm.email||'',address:qForm.address||'',title:qForm.title||qForm.client_name,taxid:qForm.taxid||'',date:qForm.date,notes:qForm.notes||'',items:qItems,status:qForm.status||'pending',...t};
    const res=editingQ?await sb.from('quotes').update(payload).eq('id',editingQ.id).select():await sb.from('quotes').insert(payload).select();
    if(res.error)notify('儲存失敗：'+res.error.message);
    else{notify('報價單已儲存 ✓');setQuoteModal(false);await loadAll();}
    setSaving(false);
  }

                      <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={p.id} onChange={e=>setProducts(ps=>ps.map((x,j)=>j===i?{...x,id:e.target.value}:x))} onBlur={e=>sb.from('products').update({id:e.target.value}).eq('id',p.id)} style={{...S.input,padding:'6px 8px'}}/></td>
                      <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={p.name} onChange={e=>setProducts(ps=>ps.map((x,j)=>j===i?{...x,name:e.target.value}:x))} onBlur={e=>sb.from('products').update({name:e.target.value}).eq('id',p.id)} style={{...S.input,padding:'6px 8px'}}/></td>
                      <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={p.price} onChange={e=>{const v=+e.target.value;setProducts(ps=>ps.map((x,j)=>j===i?{...x,price:v,price_tax:Math.round(v*1.05)}:x));}} onBlur={e=>{const v=+e.target.value;sb.from('products').update({price:v,price_tax:Math.round(v*1.05)}).eq('id',p.id);}} style={{...S.input,padding:'6px 8px',textAlign:'right'}}/></td>
                      <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={p.price_tax||0} onChange={e=>{const v=+e.target.value;setProducts(ps=>ps.map((x,j)=>j===i?{...x,price_tax:v,price:Math.round(v/1.05)}:x));}} onBlur={e=>{const v=+e.target.value;sb.from('products').update({price_tax:v,price:Math.round(v/1.05)}).eq('id',p.id);}} style={{...S.input,padding:'6px 8px',textAlign:'right'}}/></td>
                      <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><button onClick={async()=>{await sb.from('products').delete().eq('id',p.id);setProducts(ps=>ps.filter((_,j)=>j!==i));}} style={S.btn('danger')}>🗑</button></td>
                    </tr>
                  ))}</tbody>
                </table>
                </div>
              </div>
            )}
            {prodTab==='combos'&&(
              <div>
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
                  <button onClick={openNewCombo} style={S.btn()}>＋ 新增組合</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:14}}>
                  {combos.map(c=>(
                    <div key={c.id} style={{background:'#fff',border:'0.5px solid var(--border)',borderRadius:12,padding:18}}>
                      <div style={{fontWeight:500,fontSize:14.5,marginBottom:8}}>📦 {c.name}</div>
                      <div style={{fontSize:12.5,color:'var(--text2)',marginBottom:12,lineHeight:1.8}}>{c.items.map((it,idx)=><div key={idx}>{getProduct(it.pid).name||it.pid} ×{it.qty}</div>)}</div>
                      <div style={{marginBottom:12}}>
                        <div style={{fontSize:17,fontWeight:500,color:'var(--blue)'}}>{fmt(getComboTotal(c))} <span style={{fontSize:11,fontWeight:400,color:'var(--text3)'}}>未稅</span></div>
                        <div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>{fmt(getComboTotalTax(c))} <span style={{fontSize:11}}>含稅</span></div>
                      </div>
                      <div style={{display:'flex',gap:8}}>
                        <button onClick={()=>openEditCombo(c)} style={{...S.btn(),padding:'5px 12px',fontSize:12}}>✏️ 編輯</button>
                        <button onClick={async()=>{await sb.from('combos').delete().eq('id',c.id);setCombos(cs=>cs.filter(x=>x.id!==c.id));}} style={{...S.btn('danger'),padding:'5px 12px',fontSize:12}}>🗑</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      <Modal open={quoteModal} onClose={()=>setQuoteModal(false)} title={editingQ?(aiLoading?'編輯報價單　⏳ AI 辨識中...':'編輯報價單'):'新增報價單'}>
        <SecTitle>客戶資訊</SecTitle>
        <Row><Field label="診所名稱"><input style={S.input} value={qForm.client_name||''} onChange={e=>setQForm(f=>({...f,client_name:e.target.value}))}/></Field><Field label="聯絡人" half><input style={S.input} value={qForm.contact||''} onChange={e=>setQForm(f=>({...f,contact:e.target.value}))}/></Field></Row>
        <Row><Field label="電話" half><input style={S.input} value={qForm.phone||''} onChange={e=>setQForm(f=>({...f,phone:e.target.value}))}/></Field><Field label="E-Mail" half><input style={S.input} value={qForm.email||''} onChange={e=>setQForm(f=>({...f,email:e.target.value}))}/></Field></Row>
        <Row><Field label="地址"><input style={S.input} value={qForm.address||''} onChange={e=>setQForm(f=>({...f,address:e.target.value}))}/></Field></Row>
        <Row><Field label="抬頭" half><input style={S.input} value={qForm.title||''} onChange={e=>setQForm(f=>({...f,title:e.target.value}))}/></Field><Field label="統一編號" half><input style={S.input} value={qForm.taxid||''} onChange={e=>setQForm(f=>({...f,taxid:e.target.value}))}/></Field></Row>
        <Row><Field label="報價日期" half><input type="date" style={S.input} value={qForm.date||''} onChange={e=>setQForm(f=>({...f,date:e.target.value}))}/></Field><Field label="狀態" half><select style={S.input} value={qForm.status||'pending'} onChange={e=>setQForm(f=>({...f,status:e.target.value}))}><option value="pending">待確認</option><option value="confirmed">已確認</option><option value="converted">已建立訂購單</option></select></Field></Row>
        <div style={{marginTop:16,marginBottom:12}}><SecTitle>選擇組合或單品</SecTitle></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          {combos.map(c=>(
            <div key={c.id} onClick={()=>applyCombo(c)} style={{background:'var(--bg)',border:'0.5px solid var(--border2)',borderRadius:10,padding:14,cursor:'pointer'}}>
              <div style={{fontWeight:500,fontSize:13.5,marginBottom:6}}>📦 {c.name}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:8,lineHeight:1.7}}>{c.items.map((it,idx)=><div key={idx}>{getProduct(it.pid).name||it.pid} ×{it.qty}</div>)}</div>
              <div style={{fontSize:15,fontWeight:500,color:'var(--blue)'}}>{fmt(getComboTotal(c))} <span style={{fontSize:11,fontWeight:400,color:'var(--text3)'}}>未稅</span></div>
              <div style={{fontSize:12,color:'var(--text2)'}}>{fmt(getComboTotalTax(c))} 含稅</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:10,marginBottom:16}}>
          <select value={selectedItem} onChange={e=>setSelectedItem(e.target.value)} style={{...S.input,flex:1}}><option value="">— 選擇單品加入 —</option>{products.map(p=><option key={p.id} value={p.id}>{p.name} ({fmt(p.price)})</option>)}</select>
          <button onClick={addSingleItem} style={S.btn()}>＋ 加入</button>
        </div>
        <SecTitle>報價品項</SecTitle>
        <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5,marginBottom:4}}>
          <thead><tr>{['品名','品號','單價','數量','小計',''].map(h=><th key={h} style={{textAlign:'left',padding:'7px 8px',fontSize:12,color:'var(--text2)',borderBottom:'0.5px solid var(--border2)',background:'var(--bg)',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
          <tbody>{qItems.map((item,i)=>(
            <tr key={i}>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={item.name} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,name:e.target.value}:x))} style={{...S.input,padding:'5px 8px'}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={item.pid} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,pid:e.target.value}:x))} style={{...S.input,padding:'5px 8px',fontSize:12,width:90}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.price} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,price:+e.target.value}:x))} style={{...S.input,padding:'5px 8px',textAlign:'right',width:90}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.qty} min={1} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,qty:+e.target.value}:x))} style={{...S.input,padding:'5px 8px',textAlign:'right',width:60}}/></td>
              <td style={{padding:'5px 8px',borderBottom:'0.5px solid var(--border)',textAlign:'right',color:'var(--text2)',whiteSpace:'nowrap'}}>{fmt((item.price||0)*(item.qty||1))}</td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><button onClick={()=>setQItems(its=>its.filter((_,j)=>j!==i))} style={{...S.btn('danger'),padding:'4px 8px'}}>🗑</button></td>
            </tr>
          ))}</tbody>
        </table>
        </div>
        <SummaryBox items={qItems}/>
        <div style={{marginTop:14}}><Field label="備註"><textarea style={{...S.input,minHeight:70,resize:'vertical'}} value={qForm.notes||''} onChange={e=>setQForm(f=>({...f,notes:e.target.value}))}/></Field></div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>
          <button onClick={()=>setQuoteModal(false)} style={S.btn()}>取消</button>
          <button onClick={saveQuote} disabled={saving} style={S.btn('primary')}>{saving?'儲存中...':'💾 儲存報價單'}</button>
        </div>
      </Modal>

      <Modal open={orderModal} onClose={()=>setOrderModal(false)} title={editingO?'編輯訂購單':(aiLoading?'產品訂購單　⏳ AI 辨識中...':'產品訂購單')}>
        <SecTitle>收貨資訊</SecTitle>
        <Row><Field label="收貨人"><input style={S.input} value={oForm.client_name||''} onChange={e=>setOForm(f=>({...f,client_name:e.target.value}))}/></Field><Field label="聯絡人" half><input style={S.input} value={oForm.contact||''} onChange={e=>setOForm(f=>({...f,contact:e.target.value}))}/></Field></Row>
        <Row><Field label="電話" half><input style={S.input} value={oForm.phone||''} onChange={e=>setOForm(f=>({...f,phone:e.target.value}))}/></Field><Field label="E-Mail" half><input style={S.input} value={oForm.email||''} onChange={e=>setOForm(f=>({...f,email:e.target.value}))}/></Field></Row>
        <Row><Field label="收貨地址"><input style={S.input} value={oForm.address||''} onChange={e=>setOForm(f=>({...f,address:e.target.value}))}/></Field></Row>
        <Row><Field label="抬頭" half><input style={S.input} value={oForm.title||''} onChange={e=>setOForm(f=>({...f,title:e.target.value}))}/></Field><Field label="統一編號" half><input style={S.input} value={oForm.taxid||''} onChange={e=>setOForm(f=>({...f,taxid:e.target.value}))}/></Field></Row>
        <Row>
          <Field label="日期" half><input type="date" style={S.input} value={oForm.date||''} onChange={e=>setOForm(f=>({...f,date:e.target.value}))}/></Field>
          <Field label="付款方式" half><select style={S.input} value={oForm.payment||'匯款'} onChange={e=>setOForm(f=>({...f,payment:e.target.value}))}><option>匯款</option><option>月結30天</option><option>現金</option></select></Field>
        </Row>
        <Row><Field label="匯款後五碼"><input style={S.input} value={oForm.transfer_code||''} onChange={e=>setOForm(f=>({...f,transfer_code:e.target.value}))} placeholder="例如：12345" maxLength={5}/></Field></Row>
        <div style={{marginTop:16,marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <SecTitle>訂購品項</SecTitle>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
          <select onChange={e=>{
            const val=e.target.value;
            if(!val)return;
            if(val.startsWith('combo:')){
              const c=combos.find(x=>x.id===val.slice(6));
              if(c){const ni=[...oItems];c.items.forEach(ci=>{const p=getProduct(ci.pid);const itemPrice=ci.price!=null?ci.price:(p.price||0);const ex=ni.find(i=>i.pid===ci.pid);if(ex)ex.qty+=ci.qty;else ni.push({pid:p.id||ci.pid,name:p.name||ci.pid,price:itemPrice,qty:ci.qty,serialFrom:'',serialTo:''});});setOItems([...ni]);}
            }else{
              const p=products.find(x=>x.id===val);
              if(p){const ni=[...oItems];const ex=ni.find(i=>i.pid===p.id);if(ex)ex.qty+=1;else ni.push({pid:p.id,name:p.name,price:p.price||0,qty:1,serialFrom:'',serialTo:''});setOItems([...ni]);}
            }
            e.target.value='';
          }} style={{...S.input,flex:1,minWidth:180}} defaultValue="">
            <option value="">— 選擇單品或組合加入 —</option>
            <optgroup label="── 銷售組合 ──">{combos.map(c=><option key={c.id} value={`combo:${c.id}`}>📦 {c.name}（未稅{fmt(getComboTotal(c))} / 含稅{fmt(getComboTotalTax(c))}）</option>)}</optgroup>
            <optgroup label="── 單品 ──">{products.map(p=><option key={p.id} value={p.id}>{p.name}（{fmt(p.price)}）</option>)}</optgroup>
          </select>
          <button onClick={()=>setOItems(its=>[...its,{pid:'',name:'',price:0,qty:1,serialFrom:'',serialTo:''}])} style={{...S.btn(),padding:'8px 12px',fontSize:13,whiteSpace:'nowrap'}}>＋ 空白行</button>
        </div>
        <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr>
            {[['品名規格','35%'],['品號','10%'],['序號(起)','12%'],['序號(迄)','12%'],['單價','10%'],['數量','7%'],['小計','10%'],['','4%']].map(([h,w])=>(
              <th key={h} style={{textAlign:'left',padding:'7px 8px',fontSize:12,color:'var(--text2)',borderBottom:'0.5px solid var(--border2)',background:'var(--bg)',whiteSpace:'nowrap',width:w}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{oItems.map((item,i)=>(
            <tr key={i}>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={item.name} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,name:e.target.value}:x))} style={{...S.input,padding:'5px 8px',fontSize:13,minWidth:160}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={item.pid} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,pid:e.target.value}:x))} style={{...S.input,padding:'5px 8px',fontSize:12,width:90}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input placeholder="序號起" value={item.serialFrom||''} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,serialFrom:e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:90}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input placeholder="序號迄" value={item.serialTo||''} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,serialTo:e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:90}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.price} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,price:+e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:90,textAlign:'right'}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.qty} min={1} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,qty:+e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:55,textAlign:'right'}}/></td>
              <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',textAlign:'right',color:'var(--text2)',whiteSpace:'nowrap'}}>{fmt((item.price||0)*(item.qty||1))}</td>
              <td style={{padding:'4px 4px',borderBottom:'0.5px solid var(--border)'}}><button onClick={()=>setOItems(its=>its.filter((_,j)=>j!==i))} style={{...S.btn('danger'),padding:'4px 6px',fontSize:12}}>🗑</button></td>
            </tr>
          ))}</tbody>
        </table>
        </div>
        <SummaryBox items={oItems}/>
        <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>
          <button onClick={()=>setOrderModal(false)} style={S.btn()}>取消</button>
          <button onClick={saveOrder} disabled={saving} style={S.btn('primary')}>{saving?'儲存中...':'💾 儲存訂購單'}</button>
        </div>
      </Modal>

      <Toast msg={toast} onClose={()=>setToast('')}/>

      {/* 組合編輯 Modal */}
      <Modal open={comboModal} onClose={()=>setComboModal(false)} title={editingCombo?'編輯組合':'新增組合'}>
        <SecTitle>組合資訊</SecTitle>
        <Row><Field label="組合名稱"><input style={S.input} value={comboForm.name||''} onChange={e=>setComboForm(f=>({...f,name:e.target.value}))} placeholder="例如：旗艦型套組"/></Field></Row>
        <div style={{marginTop:12,marginBottom:10}}><SecTitle>組合品項</SecTitle></div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <select onChange={e=>{
            const pid=e.target.value;if(!pid)return;
            const p=products.find(x=>x.id===pid);if(!p)return;
            const ni=[...comboForm.items];
            const ex=ni.find(i=>i.pid===pid);
            if(ex)ex.qty+=1;else ni.push({pid:p.id,qty:1});
            setComboForm(f=>({...f,items:ni}));
            e.target.value='';
          }} style={{...S.input,flex:1}} defaultValue="">
            <option value="">— 選擇品項加入 —</option>
            {products.map(p=><option key={p.id} value={p.id}>{p.name}（{fmt(p.price)}）</option>)}
          </select>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr>{['品名','數量','單價(未稅)','單價(含稅)',''].map(h=><th key={h} style={{textAlign:'left',padding:'7px 8px',fontSize:12,color:'var(--text2)',borderBottom:'0.5px solid var(--border2)',background:'var(--bg)',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
          <tbody>{comboForm.items.map((item,i)=>{
            const p=getProduct(item.pid);
            const itemPrice=item.price!=null?item.price:(p.price||0);
            const itemPriceTax=item.price_tax!=null?item.price_tax:Math.round(itemPrice*1.05);
            return(
            <tr key={i}>
              <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',fontSize:13}}>{p.name||item.pid}</td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.qty} min={1} onChange={e=>setComboForm(f=>({...f,items:f.items.map((x,j)=>j===i?{...x,qty:+e.target.value}:x)}))} style={{...S.input,width:60,padding:'5px 8px',textAlign:'right'}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={itemPrice} onChange={e=>{const v=+e.target.value;setComboForm(f=>({...f,items:f.items.map((x,j)=>j===i?{...x,price:v,price_tax:Math.round(v*1.05)}:x)}));}} style={{...S.input,width:100,padding:'5px 8px',textAlign:'right'}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={itemPriceTax} onChange={e=>{const v=+e.target.value;setComboForm(f=>({...f,items:f.items.map((x,j)=>j===i?{...x,price_tax:v,price:Math.round(v/1.05)}:x)}));}} style={{...S.input,width:100,padding:'5px 8px',textAlign:'right'}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><button onClick={()=>setComboForm(f=>({...f,items:f.items.filter((_,j)=>j!==i)}))} style={{...S.btn('danger'),padding:'4px 8px'}}>🗑</button></td>
            </tr>
          );})}
          </tbody>
        </table>
        <div style={{background:'var(--bg)',borderRadius:8,padding:'10px 14px',fontSize:13.5,marginTop:8}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{color:'var(--text2)'}}>組合總價（未稅）</span>
            <strong>{fmt(comboForm.items.reduce((s,i)=>s+(i.price!=null?i.price:(getProduct(i.pid).price||0))*i.qty,0))}</strong>
          </div>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <span style={{color:'var(--text2)'}}>組合總價（含稅）</span>
            <strong>{fmt(comboForm.items.reduce((s,i)=>s+(i.price_tax!=null?i.price_tax:Math.round((i.price!=null?i.price:(getProduct(i.pid).price||0))*1.05))*i.qty,0))}</strong>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>
          <button onClick={()=>setComboModal(false)} style={S.btn()}>取消</button>
          <button onClick={saveCombo} style={S.btn('primary')}>💾 儲存組合</button>
        </div>
      </Modal>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
