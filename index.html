<title>台股AI投資</title>

<link rel="apple-touch-icon" href="/icon-512.png">
<meta name="theme-color" content="#111">

<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>
:root{
  --bg:#f6f5f0;--surface:#fff;--surface2:#f0eeea;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.13);
  --text:#111;--text2:#555;--text3:#999;
  --up:#c0392b;--dn:#27ae60;--blue:#1d4ed8;--gold:#92670a;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Noto Sans TC',sans-serif;color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column;height:100%}
.app{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* HEADER */
.hd{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 0;position:relative;z-index:50;flex-shrink:0}
.hd-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.logo{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;letter-spacing:-.5px}
.logo em{color:var(--up);font-style:normal}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-family:'Space Mono',monospace;cursor:pointer}
.dot{width:6px;height:6px;border-radius:50%;background:var(--dn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.acct-tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.acct-tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:.15s}
.tab.on{background:var(--text);color:#fff;border-color:transparent}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{padding:16px;display:none}
.page.on{display:block}

/* NAV */
.nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;transition:.15s;border:none;background:none}
.nb i{font-size:21px}
.nb.on{color:var(--text)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.card.cp{cursor:pointer}
.card.cp:active{transform:scale(.99)}
.card.acc-up{border-left:3px solid var(--up)}
.card.acc-dn{border-left:3px solid var(--dn)}
.card.acc-bl{border-left:3px solid var(--blue)}
.card.acc-gd{border-left:3px solid var(--gold)}

/* INDEX STRIP */
.idx-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:14px}
.idx-strip::-webkit-scrollbar{display:none}
.idx{flex-shrink:0;min-width:115px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.idx-n{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:2px}
.idx-v{font-family:'Space Mono',monospace;font-size:15px;font-weight:700}
.idx-c{font-size:11px;margin-top:1px;font-family:'Space Mono',monospace}

/* STOCK ROW */
.sr{display:flex;justify-content:space-between;align-items:flex-start}
.sl h3{font-size:15px;font-weight:700}
.sl .meta{font-size:11px;color:var(--text3);margin-top:2px}
.sr-r{text-align:right}
.price{font-family:'Space Mono',monospace;font-size:17px;font-weight:700}
.chg{font-size:11px;font-family:'Space Mono',monospace;margin-top:2px}
.roi{font-size:12px;margin-top:2px;font-weight:500}
.up{color:var(--up)}.dn{color:var(--dn)}.neu{color:var(--text3)}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;margin-top:6px}
.t-hold{background:#fef9e7;color:#92670a}
.t-buy {background:#ecfdf5;color:#166534}
.t-sell{background:#fef2f2;color:#991b1b}
.t-add {background:#eff6ff;color:#1e40af}
.t-watch{background:#f3f4f6;color:#374151}
.t-stop{background:#fef2f2;color:#991b1b}

/* SECTION TITLE */
.st{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px;display:flex;justify-content:space-between;align-items:center}
.sa{font-size:12px;color:var(--blue);font-weight:500;text-transform:none;letter-spacing:0;cursor:pointer}

/* OPENING CARD */
.op-card{background:var(--text);color:#fff;border-radius:var(--r);padding:16px;margin-bottom:14px;position:relative;overflow:hidden}
.op-card::before{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.05)}
.op-lbl{font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.op-v{font-size:18px;font-weight:700;margin-bottom:6px}
.op-r{font-size:12px;opacity:.7;line-height:1.7}

/* SUM GRID */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sc{background:var(--surface2);border-radius:10px;padding:12px}
.sc-l{font-size:11px;color:var(--text3)}
.sc-v{font-size:16px;font-weight:700;margin-top:3px;font-family:'Space Mono',monospace}

/* SCORE BAR */
.sb{display:flex;align-items:center;gap:8px;margin-top:8px}
.sb-track{flex:1;height:3px;background:var(--surface2);border-radius:2px}
.sb-fill{height:3px;border-radius:2px;transition:width .6s ease}
.sb-n{font-size:12px;font-weight:700;font-family:'Space Mono',monospace;width:24px;text-align:right}

/* NEWS */
.ni{padding:12px 0;border-bottom:1px solid var(--border)}
.ni:last-child{border-bottom:none}
.ni-s{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500}
.ni-t{font-size:13px;line-height:1.55}
.ni-time{font-size:10px;color:var(--text3);margin-top:3px}
.chip{background:var(--surface2);padding:1px 6px;border-radius:8px;font-size:10px}

/* ALERT */
.ar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.ar:last-child{border-bottom:none}
.toggle{width:38px;height:21px;background:#ddd;border-radius:11px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--text)}
.toggle::after{content:'';position:absolute;left:2px;top:2px;width:17px;height:17px;background:#fff;border-radius:9px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{left:19px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:8px 20px 32px;width:100%;max-width:430px}
.handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 18px}
.fl{margin-bottom:14px}
.fl label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.fi,.fs{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:10px;font-size:15px;background:var(--surface);font-family:inherit;color:var(--text);-webkit-appearance:none}
.fi:focus,.fs:focus{outline:none;border-color:var(--text)}
.btn{width:100%;padding:14px;background:var(--text);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-o{width:100%;padding:12px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:8px}
.stock-list{max-height:200px;overflow-y:auto;border:1px solid var(--border2);border-radius:10px;margin-top:4px;background:var(--surface)}
.stock-item{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);font-size:13px}
.stock-item:last-child{border-bottom:none}
.stock-item:active{background:var(--surface2)}
.stock-item .si-name{font-weight:500}
.stock-item .si-code{color:var(--text3);font-family:'Space Mono',monospace;font-size:11px}
.stock-item .si-type{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600}
.si-stock{background:#fef2f2;color:#991b1b}
.si-etf{background:#eff6ff;color:#1e40af}
.search-wrap{position:relative}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);font-size:14px;display:none}

/* DETAIL */
.det-hd{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;cursor:pointer;border-bottom:1px solid var(--border);background:var(--surface)}
.det-hd i{font-size:20px;color:var(--text2)}
.det-hd span{font-size:15px;font-weight:600}
.big{font-family:'Space Mono',monospace;font-size:36px;font-weight:700}

/* LOADING STATES */
.sk{background:linear-gradient(90deg,var(--surface2) 25%,var(--bg) 50%,var(--surface2) 75%);background-size:400% 100%;animation:sk 1.2s infinite;border-radius:6px;height:16px;display:inline-block}
@keyframes sk{0%{background-position:100%}100%{background-position:-100%}}
.api-warn{background:#fefce8;border:1px solid #fde047;border-radius:10px;padding:10px 14px;font-size:12px;color:#713f12;margin-bottom:12px;line-height:1.6}
</style>
</head>

  _processAIQueue();
}

function _processAIQueue() {
  while (_aiRunning < _AI_CONCURRENCY && _aiQueue.length > 0) {
    const task = _aiQueue.shift();
    _aiRunning++;
    _callAISingle(task.prompt, task.onResult, task.onError).finally(function() {
      _aiRunning--;
      _processAIQueue();
    });
  }
}

async function _callAISingle(prompt, onResult, onError, retries) {
  retries = retries || 0;
  try {
    const r = await fetch('/api/claude', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt}),
      signal: AbortSignal.timeout(25000),
    });
    if (r.status === 429 && retries < 3) {
      // Rate limit - 等待後重試
      await new Promise(function(res){ setTimeout(res, 2000 * (retries + 1)); });
      return _callAISingle(prompt, onResult, onError, retries + 1);
    }
    if (!r.ok) { console.error('callAI HTTP', r.status); onError && onError(); return; }
    const d = await r.json();
    if (d.ok && d.text) { onResult(d.text); }
    else { console.error('callAI no text:', d); onError && onError(); }
  } catch(e) {
    if (retries < 2) {
      await new Promise(function(res){ setTimeout(res, 1500); });
      return _callAISingle(prompt, onResult, onError, retries + 1);
    }
    console.error('callAI error:', e);
    onError && onError();
  }
}

// ─── PRICE FETCHING ─────────────────────────────────────────
// 優先使用 /api/prices（Vercel serverless），若不可用則直接呼叫 TWSE（盤後）
async function fetchPrices() {
  S.loading = true;
  setDot('loading');

  try {
    // 收集所有帳戶的持股代碼，傳給後端動態查詢
    const allCodes = new Set();
    Object.values(PF).forEach(acc => {
      (acc.stocks || []).forEach(s => allCodes.add(s.code));
    });
    const codesParam = allCodes.size > 0 ? '?codes=' + [...allCodes].join(',') : '';

    // 嘗試 Vercel serverless function
    const r = await fetch('/api/prices' + codesParam, {signal: AbortSignal.timeout(15000)});
    if (r.ok) {
      const json = await r.json();
      if (json.data && Object.keys(json.data).length > 0) {
        S.prices = json.data;
        S.pricesOk = true;
        S.loading = false;
        S.lastUpd = new Date();
        setDot('ok');
        checkAlerts();
        return;
      }
    }
  } catch(e) { console.log('api/prices error:', e); }

  // Fallback：直接呼叫 TWSE OpenAPI（無需 proxy，CORS 對部分瀏覽器開放）
  try {
    const r = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL', {
      signal: AbortSignal.timeout(10000)
    });
    if (r.ok) {
      const data = await r.json();
      if (Array.isArray(data)) {
        data.forEach(item => {
          const code  = item.Code?.trim();
          const price = parseFloat(item.ClosingPrice?.replace(/,/g,''));
          const avg   = parseFloat(item.MonthlyAveragePrice?.replace(/,/g,''));
          if (code && !isNaN(price)) {
            const change    = isNaN(avg) ? 0 : +(price - avg).toFixed(2);
            const changePct = (!isNaN(avg) && avg !== 0) ? +((price-avg)/avg*100).toFixed(2) : 0;
            S.prices[code] = {price, change, changePct, name:item.Name, ok:true};
          }
        });
        S.loading = false;
        S.lastUpd = new Date();
        setDot('ok');
        checkAlerts();
        return;
      }
    }
  } catch {}

  // 最終 fallback：API 都不可用（本地開發環境常見）
  S.loading = false;
  setDot('err');
}

function setDot(state) {
  const dot = document.getElementById('dot');
  const upd = document.getElementById('upd');
  if (state === 'loading') { dot.style.background='#f59e0b'; upd.textContent='更新中...'; return; }
  if (state === 'err')     { dot.style.background='#ef4444'; upd.textContent='API離線'; return; }
  dot.style.background = '#22c55e';
  if (S.lastUpd) {
    const h = S.lastUpd.getHours().toString().padStart(2,'0');
    const m = S.lastUpd.getMinutes().toString().padStart(2,'0');
    const s = S.lastUpd.getSeconds().toString().padStart(2,'0');
    upd.textContent = `${h}:${m}:${s}`;
  }
}

// ─── HELPERS ───────────────────────────────────────────────
function gP(code) { return S.prices[code] || null; }

function fmtN(n) {
  if (n == null || isNaN(n)) return '---';
  return n.toLocaleString('zh-TW', {maximumFractionDigits:2, minimumFractionDigits:2});
}

function fmtChg(c, p) {
  if (c == null || !isFinite(c)) return '<span class="neu">---</span>';
  const s = c >= 0 ? '+' : '', cls = c >= 0 ? 'up' : 'dn';
  return `<span class="${cls}">${s}${c.toFixed(2)} (${s}${(p||0).toFixed(2)}%)</span>`;
}

function tagH(a) {
  const m = {hold:['t-hold','⏸ 續抱'],buy:['t-buy','▲ 買進'],sell:['t-sell','▼ 出場'],add:['t-add','＋ 加倉'],watch:['t-watch','👁 觀察'],stop:['t-stop','⚠ 停損']};
  const [c,t] = m[a] || ['t-watch','觀察'];
  return `<span class="tag ${c}">${t}</span>`;
}

function priceLine(code) {
  const p = gP(code);
  if (!p) return `<span class="sk" style="width:70px;height:17px;"></span>`;
  return `$${fmtN(p.price)}`;
}

function stockCard(s, clickable=true, showDelete=false) {
  const p = gP(s.code);
  // 完全用即時損益動態判斷（不用靜態 DIAG，確保與健診一致）
  const _roi = p ? ((p.price - s.cost) / s.cost * 100) : 0;
  const d = _roi >= 30  ? {a:'sell',  l:'獲利了結'} :
            _roi <= -10 ? {a:'stop',  l:'評估停損'} :
            p && p.changePct >= 1  ? {a:'hold',  l:'續抱'} :
            p && p.changePct <= -2 ? {a:'watch', l:'觀察'} :
            {a:'hold', l:'續抱'};
  const accClass = p ? (p.change >= 0 ? 'acc-up' : 'acc-dn') : '';
  let roiH = '';
  if (p?.price) {
    const pct = ((p.price - s.cost) / s.cost * 100);
    const pnl = Math.round((p.price - s.cost) * s.qty);
    const cls = pct >= 0 ? 'up' : 'dn';
    roiH = `<div class="roi ${cls}">${pct>=0?'+':''}${pct.toFixed(1)}% (${pnl>=0?'+':''}${pnl.toLocaleString()})</div>`;
  }
  const onclick = clickable ? `onclick="openDetail('${s.code}')"` : '';
  const actionBtns = showDelete ? `
    <div style="position:absolute;top:8px;right:8px;display:flex;gap:4px">
      <button onclick="event.stopPropagation();openEditModal('${s.code}','${S.acct}')"
        style="background:var(--surface2);border:none;cursor:pointer;font-size:12px;color:var(--text2);padding:4px 8px;border-radius:6px;font-weight:600;font-family:inherit">
        編輯
      </button>

        style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:4px 6px;border-radius:6px;line-height:1">✕</button>
    </div>` : '';
  return `<div class="card ${accClass} ${clickable?'cp':''}" ${onclick} style="position:relative">

    <div class="sr">
      <div class="sl">
        <h3>${s.name} <span style="font-size:11px;font-weight:400;color:var(--text3)">${s.code}</span></h3>
        <div class="meta">${s.qty.toLocaleString()}股 · 成本 $${s.cost}</div>
        ${tagH(d.a)}
      </div>
      <div class="sr-r" style="${showDelete?'padding-right:80px':''}">
        <div class="price">${priceLine(s.code)}</div>
        <div class="chg">${p ? fmtChg(p.change, p.changePct) : '<span class="neu">---</span>'}</div>
        ${roiH}
      </div>
    </div>
  </div>`;

function checkAlerts() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const acc = PF[S.acct] || {};
  (acc.stocks||[]).forEach(s => {
    const key = S.acct+'_'+s.code;
    if (!S.alerts[key] || !S.alertPrices[key]) return;
    const target = parseFloat(S.alertPrices[key]);
    const p = gP(s.code);
    if (!p || isNaN(target)) return;
    if (Math.abs(p.price - target) / target < 0.02) {
      new Notification(`📈 到價：${s.name}`, {body:`現價 $${fmtN(p.price)} 接近目標 $${target}`});
    }
  });
}

function runBatchDiag() {
  const btn = document.getElementById('diag-btn');
  if (btn) { btn.textContent = '⏳ 分析中...'; btn.disabled = true; }

  const acc = PF[S.acct] || {stocks:[]};
  const _stocks = acc.stocks || [];
  if (_stocks.length === 0) return;

  const _taiexAI = gP('TAIEX'), _soxAI = gP('^SOX');
  var stockSummary = _stocks.map(function(s,i) {
    var p = gP(s.code);
    var roi = p ? ((p.price-s.cost)/s.cost*100).toFixed(1) : '?';
    var chg = p ? (p.changePct>=0?'+':'')+p.changePct.toFixed(2)+'%' : '—';
    return (i+1)+'. '+s.name+'('+s.code+') 損益'+roi+'% 今日'+chg;
  }).join('\n');

  var batchPrompt = '你是資深台灣股市經理人。今日大盤：加權'+(_taiexAI?(_taiexAI.changePct>=0?'+':'')+_taiexAI.changePct.toFixed(2)+'%':'—')+' 費半'+(_soxAI?(_soxAI.changePct>=0?'+':'')+_soxAI.changePct.toFixed(2)+'%':'—')+'\n\n'
    +'持倉清單：\n'+stockSummary+'\n\n'
    +'請對每支股票給出健診，回覆JSON陣列（只回JSON，不要其他文字）：\n'
    +'[{"code":"代碼","action":"加倉/續抱/觀察/減碼/停損","reason":"理由一句話含基本面或技術面判斷"}]';

  callAI(batchPrompt, function(text) {
    try {
      var clean = text.replace(/```json|```/g,'').trim();
      var diagResults = JSON.parse(clean);
      if (!Array.isArray(diagResults)) throw new Error('not array');
      diagResults.forEach(function(item) {
        var si = _stocks.findIndex(function(s){return s.code===item.code;});
        if (si < 0) return;
        var el = document.getElementById('diag-text-'+si);
        if (el) el.innerHTML = '<b>'+item.action+'</b> — '+item.reason;
        var tagEl = document.getElementById('diag-tag-'+si);
        if (tagEl) {
          var am = {'加倉':'add','續抱':'hold','觀察':'watch','減碼':'sell','停損':'stop'};
          tagEl.innerHTML = tagH(am[item.action]||'hold');
        }
      });
      if (btn) { btn.textContent = '✅ 健診完成'; btn.disabled = false; }
    } catch(e2) {
      _stocks.forEach(function(s,si) {
        var el = document.getElementById('diag-text-'+si);
        if (el) el.innerHTML = '<span style="color:var(--text3)">解析失敗，請重試</span>';
      });
      if (btn) { btn.textContent = '🔄 重新健診'; btn.disabled = false; }
    }
  }, function() {
    _stocks.forEach(function(s,si) {
      var el = document.getElementById('diag-text-'+si);
      if (el) el.innerHTML = '<span style="color:var(--text3)">健診失敗，請稍後重試</span>';
    });
    if (btn) { btn.textContent = '🔄 重新健診'; btn.disabled = false; }
  });
}

function selectType(type) {
  document.getElementById('ft').value = type;
  ['stock','etf','fund'].forEach(t => {
    const el = document.getElementById('type-'+t);
    if (t === type) {
      el.style.border = '2px solid var(--text)';
      el.style.background = 'var(--text)';
      el.style.color = '#fff';
    } else {
      el.style.border = '2px solid var(--border2)';
      el.style.background = 'transparent';
      el.style.color = 'var(--text)';
    }
  });
  // 基金時隱藏搜尋清單
  document.getElementById('stock-fields').style.display = type === 'fund' ? 'none' : 'block';
  document.getElementById('fund-fields').style.display  = type === 'fund' ? 'block' : 'none';
  // 篩選清單只顯示對應類型
  if (type !== 'fund') filterStocks();
}

function filterStocks() {
  const q    = (document.getElementById('fsearch')?.value || '').toLowerCase();
  const type = document.getElementById('ft').value;
  const clear = document.getElementById('search-clear');
  if (clear) clear.style.display = q ? 'block' : 'none';

  const filtered = STOCK_DB.filter(s => {
    const matchType = type === 'stock' ? s.type === 'stock' : type === 'etf' ? s.type === 'etf' : true;
    const matchQ    = !q || s.code.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
    return matchType && matchQ;
  });

  const list = document.getElementById('stock-list');
  if (!list) return;
  list.innerHTML = filtered.map(s => `
    <div class="stock-item" onclick="selectStock('${s.code}','${s.name}','${s.type}')">
      <div><span class="si-name">${s.name}</span></div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="si-code">${s.code}</span>
        <span class="si-type ${s.type==='etf'?'si-etf':'si-stock'}">${s.type==='etf'?'ETF':'個股'}</span>
      </div>
    </div>`).join('') || '<div style="padding:12px;color:var(--text3);font-size:13px;text-align:center">找不到，請直接輸入代碼</div>';
}

function clearSearch() {
  const s = document.getElementById('fsearch');
  if (s) { s.value = ''; filterStocks(); s.focus(); }
}

function selectStock(code, name, type) {
  // 填入欄位
  const fc = document.getElementById('fc');
  const fn = document.getElementById('fn');
  if (fc) fc.value = code;
  if (fn) fn.value = name;
  // 更新類型
  selectType(type);
  // 更新已選擇顯示
  const sel = document.getElementById('selected-stock');
  if (sel) {
    sel.style.color = 'var(--text)';
    sel.innerHTML = `<strong>${name}</strong> <span style="color:var(--text3);font-family:monospace">${code}</span>
      <span class="si-type ${type==='etf'?'si-etf':'si-stock'}" style="margin-left:6px">${type==='etf'?'ETF':'個股'}</span>`;
  }
  // 清空搜尋框，收起清單
  const fs = document.getElementById('fsearch');
  if (fs) fs.value = name;
  filterStocks();
}

function toggleFundFields() {
  const type = document.getElementById('ft').value;
  document.getElementById('stock-fields').style.display = type === 'fund' ? 'none' : 'block';
  document.getElementById('fund-fields').style.display  = type === 'fund' ? 'block' : 'none';
}

function doAdd() {
  const type = document.getElementById('ft').value;
  const acct = document.getElementById('fa').value;
  const name = document.getElementById('fn').value.trim();
  if (!name) { alert('請填寫名稱'); return; }
  if (!PF[acct]) PF[acct] = {stocks:[], funds:[]};

  if (type === 'fund') {
    const cost  = parseFloat(document.getElementById('fcost_total').value);
    const units = parseFloat(document.getElementById('funits').value);
    const nav   = parseFloat(document.getElementById('fnav').value);
    if (isNaN(cost)||isNaN(units)||isNaN(nav)) { alert('請填寫完整基金資訊'); return; }
    const code = 'FUND_' + Date.now();
    PF[acct].funds = PF[acct].funds || [];
    PF[acct].funds.push({code, name, type:'fund', cost, units, nav});
  } else {
    const code = document.getElementById('fc').value.trim().toUpperCase();
    const costPer = parseFloat(document.getElementById('fco').value);
    const qty  = parseInt(document.getElementById('fq').value);
    if (!code||isNaN(costPer)||isNaN(qty)) { alert('請填寫完整資訊'); return; }
    PF[acct].stocks = PF[acct].stocks || [];
    PF[acct].stocks.push({code, name, type, cost:costPer, qty, account:acct});
  }
  savePF();
  document.getElementById('modal').remove();
  S.acct = acct; renderTabs(); go('portfolio');
}

function deleteFund(code, acct) {
  if (!confirm('確定要刪除這筆基金？')) return;
  if (!PF[acct]?.funds) return;
  PF[acct].funds = PF[acct].funds.filter(f => f.code !== code);
  savePF(); renderPage(S.page);
}

function updateFundNav(code, acct, val) {
  const nav = parseFloat(val);
  if (isNaN(nav) || nav <= 0) return;
  const fund = (PF[acct]?.funds || []).find(f => f.code === code);
  if (!fund) return;
  fund.nav = nav;
  savePF();
  renderPage(S.page); // 重新渲染讓損益即時更新
}

function openFundAI(code, acct) {
  const fund = (PF[acct]?.funds || []).find(f => f.code === code);
  if (!fund) return;

  // 建立 AI 分析 overlay
  document.getElementById('fund-ai-modal')?.remove();
  const el = document.createElement('div');
  el.className = 'overlay'; el.id = 'fund-ai-modal';
  const mv   = fund.nav * fund.units;
  const roi  = fund.cost > 0 ? ((mv - fund.cost) / fund.cost * 100).toFixed(1) : 0;
  const pnl  = Math.round(mv - fund.cost);

  el.innerHTML = `<div class="sheet" style="max-height:80vh;overflow-y:auto">
    <div class="handle"></div>
    <div style="font-size:17px;font-weight:700;margin-bottom:4px">🤖 AI 基金分析</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:16px">${fund.name}</div>
    <div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;line-height:1.8">
      <div>📊 投入金額：NT$${fund.cost.toLocaleString()}</div>
      <div>💰 目前市值：NT$${Math.round(mv).toLocaleString()}</div>
      <div>📈 未實現損益：<span class="${pnl>=0?'up':'dn'}">${pnl>=0?'+':''}${roi}% (${pnl>=0?'+':''}NT$${Math.abs(pnl).toLocaleString()})</span></div>
      <div>📋 淨值：$${fund.nav} × ${fund.units}單位</div>
    </div>
    <div id="fund-ai-result" style="font-size:13px;line-height:1.85;color:var(--text);min-height:80px">
      <div style="text-align:center;padding:20px;color:var(--text3)">⏳ AI 分析中...</div>
    </div>
    <button class="btn-o" style="margin-top:16px" onclick="document.getElementById('fund-ai-modal').remove()">關閉</button>
  </div>`;
  el.addEventListener('click', e => { if(e.target===el) el.remove(); });
  document.body.appendChild(el);

  // 呼叫 Claude API
  const taiex = gP('TAIEX'), sp500 = gP('^GSPC'), sox = gP('^SOX');
  const marketCtx = [
    taiex ? `台灣加權指數 ${taiex.price?.toLocaleString()} 點（${taiex.changePct>=0?'+':''}${taiex.changePct}%）` : '',
    sp500 ? `S&P500 ${sp500.price?.toFixed(0)}（${sp500.changePct>=0?'+':''}${sp500.changePct}%）` : '',
    sox   ? `費城半導體 ${sox.price?.toFixed(0)}（${sox.changePct>=0?'+':''}${sox.changePct}%）` : '',
  ].filter(Boolean).join('、');

  // Gemini AI 基金分析
  const _tF=gP('TAIEX'),_sF=gP('^GSPC');
  callAI(
    '你是台灣基金投資顧問，請用繁體中文分析以下基金，簡潔適合手機。\n'
    +'基金：'+fund.name+'\n'
    +'投入：NT$'+fund.cost.toLocaleString()+'\n'
    +'市值：NT$'+Math.round(mv).toLocaleString()+'\n'
    +'損益：'+(roi>=0?'+':'')+roi+'%\n'
    +'加權：'+(_tF?(_tF.changePct>=0?'+':'')+_tF.changePct?.toFixed(2)+'%':'—')+'\n'
    +'S&P500：'+(_sF?(_sF.changePct>=0?'+':'')+_sF.changePct?.toFixed(2)+'%':'—')+'\n\n'
    +'請分析：\n【目前狀況】\n【操作建議】加倉/續抱/減碼\n【風險提示】',
    function(text){
      var el=document.getElementById('fund-ai-result');
      if(!el)return;
      el.innerHTML='<div style="font-size:13px;line-height:1.85">'+text.split('\n').join('<br>').replace(/【([^】]+)】/g,'<br><strong style="color:var(--gold);font-size:11px">【$1】</strong><br>')+'</div>';
    },
    function(){
      var el=document.getElementById('fund-ai-result');
      if(el)el.innerHTML='<span style="color:var(--text3)">分析失敗，請稍後再試</span>';
    }
  );
}
function openEditModal(code, acct) {
  const s = (PF[acct]?.stocks || []).find(x => x.code === code);
  if (!s) return;
  document.getElementById('edit-modal')?.remove();
  const el = document.createElement('div');
  el.className = 'overlay'; el.id = 'edit-modal';
  el.innerHTML = `<div class="sheet">
    <div class="handle"></div>
    <div style="font-size:17px;font-weight:700;margin-bottom:4px">編輯持倉</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:18px">${s.name} · ${s.code}</div>
    <div class="fl">
      <label>平均成本（元/股）</label>
      <input type="number" class="fi" id="edit-cost" value="${s.cost}" step="0.01">
    </div>
    <div class="fl">
      <label>持有股數</label>
      <input type="number" class="fi" id="edit-qty" value="${s.qty}">
    </div>
    <div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--text3);line-height:1.8">
      目前成本總額：NT$<span id="edit-preview">${(s.cost*s.qty).toLocaleString()}</span>
    </div>
    <button class="btn" onclick="doEdit('${code}','${acct}')">確認修改</button>
    <button class="btn-o" onclick="document.getElementById('edit-modal').remove()">取消</button>
  </div>`;
  // 即時預覽成本總額
  el.querySelectorAll && setTimeout(() => {
    const costEl = document.getElementById('edit-cost');
    const qtyEl  = document.getElementById('edit-qty');
    const prev   = document.getElementById('edit-preview');
    [costEl, qtyEl].forEach(inp => inp?.addEventListener('input', () => {
      const c = parseFloat(costEl?.value||0), q = parseInt(qtyEl?.value||0);
      if (prev && !isNaN(c) && !isNaN(q)) prev.textContent = Math.round(c*q).toLocaleString();
    }));
  }, 50);
  el.addEventListener('click', e => { if(e.target===el) el.remove(); });
  document.body.appendChild(el);
}

function doEdit(code, acct) {
  const cost = parseFloat(document.getElementById('edit-cost')?.value);
  const qty  = parseInt(document.getElementById('edit-qty')?.value);
  if (isNaN(cost) || isNaN(qty) || cost <= 0 || qty <= 0) {
    alert('請填寫正確的成本和股數'); return;
  }
  const s = (PF[acct]?.stocks || []).find(x => x.code === code);
  if (!s) return;
  s.cost = cost;
  s.qty  = qty;
  savePF();
  document.getElementById('edit-modal')?.remove();
  renderPage(S.page);
}

function deleteStock(code, acct) {
  if (!confirm(`確定要刪除 ${code}？`)) return;
  if (!PF[acct]?.stocks) return;
  PF[acct].stocks = PF[acct].stocks.filter(s => s.code !== code);
  savePF();
  renderPage(S.page);
}

// ─── NAV ───────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
  document.getElementById('content').scrollTop = 0;
}

function renderPage(page) {
  switch(page){
    case 'home':      renderHome(); break;
    case 'portfolio': renderPortfolio(); break;
    case 'ai':        renderAI(); break;
    case 'news':      renderNews(); break;
    case 'alert':     renderAlert(); break;
  }
}

function go(page) {
  S.page = page; S.prevPage = page;
  const map = {home:'p-home',portfolio:'p-portfolio',ai:'p-ai',news:'p-news',alert:'p-alert'};
  showPage(map[page]);
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('nb-'+page)?.classList.add('on');
  renderPage(page);
  // 若股價還沒載入完，切頁後自動重試一次
  if (S.loading) {
    fetchPrices().then(() => renderPage(page));
  }
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = ACCOUNTS.map(a=>
    `<div class="tab ${a.id===S.acct?'on':''}" onclick="setAcct('${a.id}')">${a.e} ${a.name}</div>`
  ).join('');
}

function setAcct(id) {
  S.acct = id; renderTabs(); renderPage(S.page);
}

// ─── INIT ───────────────────────────────────────────────────
renderTabs();
renderHome();

// 確保 fetch 完成後重渲染當前頁面（解決持倉頁股價空白問題）
async function fetchAndRender() {
  await fetchPrices();
  renderPage(S.page);
  if (S.page !== 'home') renderHome();
}

// 啟動：先從雲端同步持倉，再抓股價
(async () => {
  // 顯示同步中提示
  setDot('loading');
  document.getElementById('upd').textContent = '同步中...';

  const synced = await loadFromCloud();
  if (synced) {
    renderTabs();   // 更新帳戶 tab
    renderPage(S.page); // 更新頁面顯示
  }

  // 同步完成後抓股價
  await fetchAndRender();
  setInterval(fetchAndRender, 60000);
})();
</script>
