}

function App(){
  const[page,setPage]=useState('quotes');
  const[products,setProducts]=useState(DEFAULT_PRODUCTS);
  const[quotes,setQuotes]=useState([]);
  const[orders,setOrders]=useState([]);
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState('');
  const[quoteModal,setQuoteModal]=useState(false);
  const[orderModal,setOrderModal]=useState(false);
  const[editingQ,setEditingQ]=useState(null);
  const[editingO,setEditingO]=useState(null);
  const[qForm,setQForm]=useState({});
  const[qItems,setQItems]=useState([]);
  const[oForm,setOForm]=useState({});
  const[oItems,setOItems]=useState([]);
  const[selectedItem,setSelectedItem]=useState('');
  const[uploading,setUploading]=useState(false);
  const[batchProgress,setBatchProgress]=useState('');
  const[saving,setSaving]=useState(false);
  const[aiLoading,setAiLoading]=useState(false);
  const[qSearch,setQSearch]=useState('');
  const[qFilter,setQFilter]=useState('');
  const[qSort,setQSort]=useState('newest');
  const[oSearch,setOSearch]=useState('');
  const[prodTab,setProdTab]=useState('products');

  const notify=msg=>setToast(msg);

  useEffect(()=>{loadAll();},[]);

  async function loadAll(){
    setLoading(true);
    try{
      const[qRes,oRes]=await Promise.all([
        sb.from('quotes').select('*').order('created_at',{ascending:false}),
        sb.from('orders').select('*').order('created_at',{ascending:false}),
      ]);
      if(qRes.data)setQuotes(qRes.data);
      if(oRes.data)setOrders(oRes.data);
    }catch(e){notify('載入失敗');}
    setLoading(false);
  }

  function getProduct(pid){return products.find(p=>p.id===pid)||{};}
  function getComboTotal(c){return c.items.reduce((s,i)=>s+(getProduct(i.pid).price||0)*i.qty,0);}
  function calcTotals(items){const sub=items.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);return{subtotal:sub,tax:Math.round(sub*0.05),total:sub+Math.round(sub*0.05)};}

  const filteredQuotes=useMemo(()=>{
    const s=qSearch.toLowerCase();
    return quotes
      .filter(q=>(!s||q.client_name?.toLowerCase().includes(s)||q.contact?.toLowerCase().includes(s)||(q.taxid||'').includes(s)||(q.notes||'').toLowerCase().includes(s))&&(!qFilter||q.status===qFilter))
      .sort((a,b)=>qSort==='oldest'?(a.date||'').localeCompare(b.date||''):(b.date||'').localeCompare(a.date||''));
  },[quotes,qSearch,qFilter,qSort]);

  const filteredOrders=useMemo(()=>{
    const s=oSearch.toLowerCase();
    return orders.filter(o=>!s||o.client_name?.toLowerCase().includes(s)||o.id?.toLowerCase().includes(s));
  },[orders,oSearch]);

  function openNewQuote(){
    setEditingQ(null);
    setQForm({date:today(),expiry:30,status:'pending'});
    setQItems([]);
    setQuoteModal(true);
  }

  async function openEditQuote(q){
    setEditingQ(q);
    setQForm({client_name:q.client_name,contact:q.contact||'',phone:q.phone||'',email:q.email||'',address:q.address||'',title:q.title||'',taxid:q.taxid||'',date:q.date,notes:q.notes||'',expiry:30,status:q.status});
    setQItems((q.items||[]).map(i=>({...i})));
    setQuoteModal(true);
    if(q.pdf_url){
      setAiLoading(true);
      try{
        const[infoRes,itemsRes]=await Promise.all([
          fetch('/api/parse-pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pdfUrl:q.pdf_url,mode:'info'})}),
          fetch('/api/parse-pdf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pdfUrl:q.pdf_url,mode:'items'})}),
        ]);
        const[infoD,itemsD]=await Promise.all([infoRes.json(),itemsRes.json()]);
        if(infoD.result){
          const i=infoD.result;
          setQForm(f=>({...f,client_name:i.client_name||f.client_name,contact:i.contact||f.contact,phone:i.phone||f.phone,email:i.email||f.email,address:i.address||f.address,title:i.title||f.title,taxid:i.taxid||f.taxid,date:i.date||f.date}));
        }
        if(itemsD.result&&itemsD.result.length>0)setQItems(itemsD.result);
        notify('AI 辨識完成 ✓');
      }catch(e){notify('AI 辨識失敗，請手動填寫');}
      setAiLoading(false);
    }
  }

  async function updateQuoteStatus(id,status){
    await sb.from('quotes').update({status}).eq('id',id);
    setQuotes(qs=>qs.map(q=>q.id===id?{...q,status}:q));
  }

  async function handlePdfUpload(e,quoteId){
    const file=e.target.files[0];if(!file)return;
    setUploading(true);
    const path=`${quoteId}/${Date.now()}.pdf`;
    const{error}=await sb.storage.from('quotes-pdf').upload(path,file,{upsert:true});
    if(error){notify('上傳失敗：'+error.message);setUploading(false);return;}
    const{data:{publicUrl}}=sb.storage.from('quotes-pdf').getPublicUrl(path);
    await sb.from('quotes').update({pdf_url:publicUrl}).eq('id',quoteId);
    setQuotes(qs=>qs.map(q=>q.id===quoteId?{...q,pdf_url:publicUrl}:q));
    notify('PDF 已上傳 ✓');
    setUploading(false);
    e.target.value='';
  }

  function parseClinicFromFilename(filename){
    const noExt=filename.replace(/\.pdf$/i,'');
    const noDate=noExt.replace(/^\d{4}[_\-]?\d{0,2}[_\-]?\d{0,2}[\s_\-]*/,'');
    const match=noDate.match(/[\u4e00-\u9fff\u3400-\u4dbf]+(?:[\s\u3000]*[\u4e00-\u9fff\u3400-\u4dbf]+)*/);
    return match?match[0].trim():'';
  }

  function parseDateFromFilename(filename){
    const m=filename.match(/(\d{4})[_\-]?(\d{2})[_\-]?(\d{2})/);
    if(m)return`${m[1]}-${m[2]}-${m[3]}`;
    const m2=filename.match(/^(\d{4})\b/);
    if(m2)return`${m2[1]}-01-01`;
    return today();
  }

  async function handleBatchUpload(e){
    const allFiles=Array.from(e.target.files).filter(f=>f.name.toLowerCase().endsWith('.pdf'));
    const files=allFiles.filter(f=>f.name.includes('報價單'));
    if(!files.length){notify(`找不到含「報價單」的 PDF，共掃描 ${allFiles.length} 個`);return;}
    setUploading(true);
    let ok=0,fail=0;
    for(let i=0;i<files.length;i++){
      const file=files[i];
      setBatchProgress(`上傳中 ${i+1}/${files.length}`);
      const clinicName=parseClinicFromFilename(file.name)||'未命名診所';
      const fileDate=parseDateFromFilename(file.name);
      const path=`b${Date.now()}${i}/${Date.now()}.pdf`;
      const{error:upErr}=await sb.storage.from('quotes-pdf').upload(path,file,{upsert:true});
      if(upErr){fail++;continue;}
      const{data:{publicUrl}}=sb.storage.from('quotes-pdf').getPublicUrl(path);
      const{error:dbErr}=await sb.from('quotes').insert({client_name:clinicName,contact:'',phone:'',email:'',address:'',title:clinicName,taxid:'',date:fileDate,notes:file.name.replace(/\.pdf$/i,''),items:[],subtotal:0,tax:0,total:0,status:'pending',pdf_url:publicUrl});
      if(dbErr)fail++;else ok++;
    }
    setBatchProgress('');setUploading(false);
    notify(`批次上傳完成：${ok} 份成功${fail?`，${fail} 份失敗`:''} ✓`);
    await loadAll();
    e.target.value='';
  }

  async function saveQuote(){
    if(!qForm.client_name){notify('請填寫診所名稱');return;}
    setSaving(true);
    const t=calcTotals(qItems);
    const payload={client_name:qForm.client_name,contact:qForm.contact||'',phone:qForm.phone||'',email:qForm.email||'',address:qForm.address||'',title:qForm.title||qForm.client_name,taxid:qForm.taxid||'',date:qForm.date,notes:qForm.notes||'',items:qItems,status:qForm.status||'pending',...t};
    const res=editingQ?await sb.from('quotes').update(payload).eq('id',editingQ.id).select():await sb.from('quotes').insert(payload).select();
    if(res.error)notify('儲存失敗：'+res.error.message);
    else{notify('報價單已儲存 ✓');setQuoteModal(false);await loadAll();}
    setSaving(false);
  }

  async function deleteQuote(id){
    if(!confirm('確定刪除？'))return;
    await sb.from('quotes').delete().eq('id',id);
    setQuotes(qs=>qs.filter(q=>q.id!==id));
    notify('已刪除');
  }

  function convertToOrder(q){
    setEditingO(null);
    setOForm({client_name:q.client_name||'',contact:q.contact||'',phone:q.phone||'',email:q.email||'',address:q.address||'',title:q.title||q.client_name||'',taxid:q.taxid||'',date:today(),payment:'匯款',transfer_code:'',quote_id:q.id});
    setOItems((q.items||[]).map(i=>({...i,serialFrom:'',serialTo:''})));
    updateQuoteStatus(q.id,'converted');
    setOrderModal(true);
  }

  function openEditOrder(o){
    setEditingO(o);
    setOForm({client_name:o.client_name,contact:o.contact||'',phone:o.phone||'',email:o.email||'',address:o.address||'',title:o.title||'',taxid:o.taxid||'',date:o.date,payment:o.payment,transfer_code:o.transfer_code||'',quote_id:o.quote_id});
    setOItems((o.items||[]).map(i=>({...i})));
    setOrderModal(true);
  }

  async function saveOrder(){
    if(!oForm.client_name){notify('請填寫收貨人');return;}
    setSaving(true);
    const t=calcTotals(oItems);
    const payload={client_name:oForm.client_name,contact:oForm.contact||'',phone:oForm.phone||'',email:oForm.email||'',address:oForm.address||'',title:oForm.title||'',taxid:oForm.taxid||'',date:oForm.date,payment:oForm.payment,transfer_code:oForm.transfer_code||'',items:oItems,status:'pending',quote_id:oForm.quote_id||null,...t};
    const res=editingO?await sb.from('orders').update(payload).eq('id',editingO.id).select():await sb.from('orders').insert(payload).select();
    if(res.error)notify('儲存失敗：'+res.error.message);
    else{notify('訂購單已儲存 ✓');setOrderModal(false);await loadAll();setPage('orders');}
    setSaving(false);
  }

  async function deleteOrder(id){
    if(!confirm('確定刪除？'))return;
    await sb.from('orders').delete().eq('id',id);
    setOrders(os=>os.filter(o=>o.id!==id));
    notify('已刪除');
  }

  async function toggleOrderStatus(o){
    const ns=o.status==='shipped'?'pending':'shipped';
    await sb.from('orders').update({status:ns}).eq('id',o.id);
    setOrders(os=>os.map(x=>x.id===o.id?{...x,status:ns}:x));
  }

  function applyCombo(c){
    const ni=[...qItems];
    c.items.forEach(ci=>{const p=getProduct(ci.pid);const ex=ni.find(i=>i.pid===ci.pid);if(ex)ex.qty+=ci.qty;else ni.push({pid:ci.pid,name:p.name||ci.pid,price:p.price||0,qty:ci.qty});});
    setQItems([...ni]);
  }

  function addSingleItem(){
    if(!selectedItem)return;
    const p=getProduct(selectedItem);
    const ni=[...qItems];
    const ex=ni.find(i=>i.pid===selectedItem);
    if(ex)ex.qty+=1;else ni.push({pid:p.id,name:p.name,price:p.price||0,qty:1});
    setQItems([...ni]);setSelectedItem('');
  }

  const navItems=[{id:'quotes',icon:'📄',label:'報價單'},{id:'orders',icon:'📋',label:'訂購單'},{id:'products',icon:'📦',label:'產品設定'}];

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div style={{width:200,minWidth:200,background:'#fff',borderRight:'0.5px solid var(--border)',padding:16,display:'flex',flexDirection:'column',gap:2,position:'sticky',top:0,height:'100vh'}}>
        <div style={{fontSize:14,fontWeight:600,padding:'8px 10px 16px',borderBottom:'0.5px solid var(--border)',marginBottom:8}}>WellMike<br/><span style={{fontSize:11,fontWeight:400,color:'var(--text3)'}}>報價單管理系統</span></div>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,border:'none',background:page===n.id?'var(--bg)':'none',color:page===n.id?'var(--text)':'var(--text2)',fontWeight:page===n.id?500:400,fontSize:14,cursor:'pointer',textAlign:'left',width:'100%'}}>
            <span>{n.icon}</span>{n.label}
            {n.id==='quotes'&&quotes.filter(q=>q.status==='pending').length>0&&<span style={{marginLeft:'auto',background:'var(--blue)',color:'#fff',fontSize:11,borderRadius:99,padding:'1px 7px'}}>{quotes.filter(q=>q.status==='pending').length}</span>}
          </button>
        ))}
      </div>

      <div style={{flex:1,padding:24,overflowY:'auto',maxWidth:900}}>
        {loading&&<div style={{padding:60,textAlign:'center',color:'var(--text3)'}}>載入中...</div>}

        {!loading&&page==='quotes'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
              <div style={{fontSize:20,fontWeight:500}}>報價單管理</div>
              <button onClick={openNewQuote} style={S.btn('primary')}>＋ 新增報價單</button>
            </div>
            <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
              <input value={qSearch} onChange={e=>setQSearch(e.target.value)} placeholder="搜尋診所名稱、聯絡人、統編、檔名..." style={{...S.input,flex:1,minWidth:200}}/>
              <select value={qFilter} onChange={e=>setQFilter(e.target.value)} style={{...S.input,width:'auto'}}>
                <option value="">全部狀態</option>
                <option value="pending">待確認</option>
                <option value="confirmed">已確認</option>
                <option value="converted">已建立訂購單</option>
              </select>
              <select value={qSort} onChange={e=>setQSort(e.target.value)} style={{...S.input,width:'auto'}}>
                <option value="newest">最新優先</option>
                <option value="oldest">最舊優先</option>
              </select>
            </div>
            <div style={{border:'1.5px dashed var(--border2)',borderRadius:12,padding:'20px',textAlign:'center',marginBottom:18,background:'#fff'}}>
              <div style={{fontSize:26,marginBottom:8}}>{uploading?'⏳':'📤'}</div>
              <div style={{fontWeight:500,color:'var(--text)',marginBottom:4}}>{batchProgress||'批次上傳報價單 PDF'}</div>
              <div style={{fontSize:12.5,color:'var(--text2)',marginBottom:14}}>只有檔名含「報價單」的 PDF 才會匯入，自動辨識診所名稱與日期</div>
              <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
                <label style={{...S.btn('primary'),cursor:'pointer'}}>
                  <input type="file" accept=".pdf" multiple style={{display:'none'}} onChange={handleBatchUpload} disabled={uploading}/>
                  📄 選擇多個檔案
                </label>
                <label style={{...S.btn(),cursor:'pointer'}}>
                  <input type="file" accept=".pdf" webkitdirectory style={{display:'none'}} onChange={handleBatchUpload} disabled={uploading}/>
                  📁 選擇整個資料夾
                </label>
              </div>
            </div>
            {filteredQuotes.length===0?<div style={{padding:40,textAlign:'center',color:'var(--text3)'}}>尚無報價單</div>:filteredQuotes.map(q=>(
              <div key={q.id} style={S.card}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,gap:10}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:15}}>{q.client_name}</div>
                    <div style={{fontSize:13,color:'var(--text2)',marginTop:3}}>{q.contact&&`聯絡人：${q.contact}　`}{q.phone&&`${q.phone}　`}{q.taxid&&`統編：${q.taxid}`}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}><Badge status={q.status}/><div style={{fontSize:12,color:'var(--text3)',marginTop:5}}>📅 {q.date}</div></div>
                </div>
                <div style={{fontSize:13,color:'var(--text2)',marginBottom:6}}>總計：<strong>{fmt(q.total)}</strong>　{(q.items||[]).length} 項{q.pdf_url&&<a href={q.pdf_url} target="_blank" style={{marginLeft:12,color:'var(--blue)',fontSize:12}}>📎 查看PDF</a>}</div>
                {q.notes&&<div style={{fontSize:12.5,color:'var(--text3)',marginBottom:8,background:'var(--bg)',borderRadius:6,padding:'5px 10px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📄 {q.notes}</div>}
                <div style={{display:'flex',gap:8,paddingTop:10,borderTop:'0.5px solid var(--border)',flexWrap:'wrap'}}>
                  <button onClick={()=>openEditQuote(q)} style={S.btn()}>✏️ 編輯</button>
                  <button onClick={()=>convertToOrder(q)} style={S.btn('primary')}>→ 轉訂購單</button>
                  {q.status==='pending'&&<button onClick={()=>updateQuoteStatus(q.id,'confirmed')} style={S.btn()}>✓ 確認</button>}
                  <label style={{...S.btn(),cursor:'pointer'}}><input type="file" accept=".pdf" style={{display:'none'}} onChange={e=>handlePdfUpload(e,q.id)}/>📎 上傳PDF</label>
                  <button onClick={()=>deleteQuote(q.id)} style={S.btn('danger')}>🗑</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {!loading&&page==='orders'&&(
          <div>
            <div style={{fontSize:20,fontWeight:500,marginBottom:20}}>訂購單管理</div>
            <input value={oSearch} onChange={e=>setOSearch(e.target.value)} placeholder="搜尋診所名稱..." style={{...S.input,marginBottom:16}}/>
            {filteredOrders.length===0?<div style={{padding:40,textAlign:'center',color:'var(--text3)'}}>尚無訂購單</div>:filteredOrders.map(o=>(
              <div key={o.id} style={S.card}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,gap:10}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:15}}>{o.client_name}</div>
                    <div style={{fontSize:13,color:'var(--text2)',marginTop:3}}>{o.contact&&`${o.contact}　`}{o.taxid&&`統編：${o.taxid}　`}付款：{o.payment}</div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}><Badge status={o.status}/><div style={{fontSize:12,color:'var(--text3)',marginTop:5}}>{o.date}</div></div>
                </div>
                <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>總計：<strong>{fmt(o.total)}</strong>　{(o.items||[]).length} 項</div>
                <div style={{display:'flex',gap:8,paddingTop:10,borderTop:'0.5px solid var(--border)',flexWrap:'wrap'}}>
                  <button onClick={()=>openEditOrder(o)} style={S.btn()}>✏️ 編輯</button>
                  <button onClick={()=>toggleOrderStatus(o)} style={S.btn(o.status==='shipped'?'':'primary')}>{o.status==='shipped'?'↩ 改待出貨':'✓ 標記出貨'}</button>
                  <button onClick={()=>printOrder(o)} style={S.btn()}>🖨️ 列印訂購單</button>
                  <button onClick={()=>deleteOrder(o.id)} style={S.btn('danger')}>🗑</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {!loading&&page==='products'&&(
          <div>
            <div style={{fontSize:20,fontWeight:500,marginBottom:20}}>產品與組合設定</div>
            <div style={{display:'flex',gap:2,marginBottom:20,borderBottom:'0.5px solid var(--border)'}}>
              {[['products','產品項目'],['combos','銷售組合']].map(([id,label])=>(
                <button key={id} onClick={()=>setProdTab(id)} style={{padding:'9px 20px',border:'none',background:'none',cursor:'pointer',fontSize:14,color:prodTab===id?'var(--blue)':'var(--text2)',fontWeight:prodTab===id?500:400,borderBottom:prodTab===id?'2px solid var(--blue)':'2px solid transparent',marginBottom:-0.5}}>{label}</button>
              ))}
            </div>
            {prodTab==='products'&&(
              <div>
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}><button onClick={()=>setProducts(ps=>[...ps,{id:'',name:'',price:0,msrp:0}])} style={S.btn()}>＋ 新增</button></div>
                <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5}}>
                  <thead><tr>{['品號','品名','建議售價','進貨價(未稅)',''].map(h=><th key={h} style={{textAlign:'left',padding:'8px 10px',fontSize:12,color:'var(--text2)',borderBottom:'0.5px solid var(--border2)',background:'var(--bg)',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
                  <tbody>{products.map((p,i)=>(
                    <tr key={i}>
                      {['id','name','msrp','price'].map(f=>(
                        <td key={f} style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}>
                          <input value={p[f]} type={f==='msrp'||f==='price'?'number':'text'} onChange={e=>setProducts(ps=>ps.map((x,j)=>j===i?{...x,[f]:f==='msrp'||f==='price'?+e.target.value:e.target.value}:x))} style={{...S.input,padding:'6px 8px',textAlign:f==='msrp'||f==='price'?'right':'left'}}/>
                        </td>
                      ))}
                      <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><button onClick={()=>setProducts(ps=>ps.filter((_,j)=>j!==i))} style={S.btn('danger')}>🗑</button></td>
                    </tr>
                  ))}</tbody>
                </table>
                </div>
              </div>
            )}
            {prodTab==='combos'&&(
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:14}}>
                {DEFAULT_COMBOS.map(c=>(
                  <div key={c.id} style={{background:'#fff',border:'0.5px solid var(--border)',borderRadius:12,padding:18}}>
                    <div style={{fontWeight:500,fontSize:14.5,marginBottom:8}}>📦 {c.name}</div>
                    <div style={{fontSize:12.5,color:'var(--text2)',marginBottom:12,lineHeight:1.8}}>{c.items.map((it,idx)=><div key={idx}>{getProduct(it.pid).name||it.pid} ×{it.qty}</div>)}</div>
                    <div style={{fontSize:17,fontWeight:500,color:'var(--blue)'}}>{fmt(getComboTotal(c))} <span style={{fontSize:11,fontWeight:400,color:'var(--text3)'}}>未稅</span></div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      <Modal open={quoteModal} onClose={()=>setQuoteModal(false)} title={editingQ?(aiLoading?'編輯報價單　⏳ AI 辨識中...':'編輯報價單'):'新增報價單'}>
        <SecTitle>客戶資訊</SecTitle>
        <Row><Field label="診所名稱"><input style={S.input} value={qForm.client_name||''} onChange={e=>setQForm(f=>({...f,client_name:e.target.value}))}/></Field><Field label="聯絡人" half><input style={S.input} value={qForm.contact||''} onChange={e=>setQForm(f=>({...f,contact:e.target.value}))}/></Field></Row>
        <Row><Field label="電話" half><input style={S.input} value={qForm.phone||''} onChange={e=>setQForm(f=>({...f,phone:e.target.value}))}/></Field><Field label="E-Mail" half><input style={S.input} value={qForm.email||''} onChange={e=>setQForm(f=>({...f,email:e.target.value}))}/></Field></Row>
        <Row><Field label="地址"><input style={S.input} value={qForm.address||''} onChange={e=>setQForm(f=>({...f,address:e.target.value}))}/></Field></Row>
        <Row><Field label="抬頭" half><input style={S.input} value={qForm.title||''} onChange={e=>setQForm(f=>({...f,title:e.target.value}))}/></Field><Field label="統一編號" half><input style={S.input} value={qForm.taxid||''} onChange={e=>setQForm(f=>({...f,taxid:e.target.value}))}/></Field></Row>
        <Row><Field label="報價日期" half><input type="date" style={S.input} value={qForm.date||''} onChange={e=>setQForm(f=>({...f,date:e.target.value}))}/></Field><Field label="狀態" half><select style={S.input} value={qForm.status||'pending'} onChange={e=>setQForm(f=>({...f,status:e.target.value}))}><option value="pending">待確認</option><option value="confirmed">已確認</option><option value="converted">已建立訂購單</option></select></Field></Row>
        <div style={{marginTop:16,marginBottom:12}}><SecTitle>選擇組合或單品</SecTitle></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          {DEFAULT_COMBOS.map(c=>(
            <div key={c.id} onClick={()=>applyCombo(c)} style={{background:'var(--bg)',border:'0.5px solid var(--border2)',borderRadius:10,padding:14,cursor:'pointer'}}>
              <div style={{fontWeight:500,fontSize:13.5,marginBottom:6}}>📦 {c.name}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:8,lineHeight:1.7}}>{c.items.map((it,idx)=><div key={idx}>{getProduct(it.pid).name||it.pid} ×{it.qty}</div>)}</div>
              <div style={{fontSize:15,fontWeight:500,color:'var(--blue)'}}>{fmt(getComboTotal(c))}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:10,marginBottom:16}}>
          <select value={selectedItem} onChange={e=>setSelectedItem(e.target.value)} style={{...S.input,flex:1}}><option value="">— 選擇單品加入 —</option>{products.map(p=><option key={p.id} value={p.id}>{p.name} ({fmt(p.price)})</option>)}</select>
          <button onClick={addSingleItem} style={S.btn()}>＋ 加入</button>
        </div>
        <SecTitle>報價品項</SecTitle>
        <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5,marginBottom:4}}>
          <thead><tr>{['品名','品號','單價','數量','小計',''].map(h=><th key={h} style={{textAlign:'left',padding:'7px 8px',fontSize:12,color:'var(--text2)',borderBottom:'0.5px solid var(--border2)',background:'var(--bg)',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
          <tbody>{qItems.map((item,i)=>(
            <tr key={i}>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={item.name} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,name:e.target.value}:x))} style={{...S.input,padding:'5px 8px'}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={item.pid} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,pid:e.target.value}:x))} style={{...S.input,padding:'5px 8px',fontSize:12,width:90}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.price} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,price:+e.target.value}:x))} style={{...S.input,padding:'5px 8px',textAlign:'right',width:90}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.qty} min={1} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,qty:+e.target.value}:x))} style={{...S.input,padding:'5px 8px',textAlign:'right',width:60}}/></td>
              <td style={{padding:'5px 8px',borderBottom:'0.5px solid var(--border)',textAlign:'right',color:'var(--text2)',whiteSpace:'nowrap'}}>{fmt((item.price||0)*(item.qty||1))}</td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><button onClick={()=>setQItems(its=>its.filter((_,j)=>j!==i))} style={{...S.btn('danger'),padding:'4px 8px'}}>🗑</button></td>
            </tr>
          ))}</tbody>
        </table>
        </div>
        <SummaryBox items={qItems}/>
        <div style={{marginTop:14}}><Field label="備註"><textarea style={{...S.input,minHeight:70,resize:'vertical'}} value={qForm.notes||''} onChange={e=>setQForm(f=>({...f,notes:e.target.value}))}/></Field></div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>
          <button onClick={()=>setQuoteModal(false)} style={S.btn()}>取消</button>
          <button onClick={saveQuote} disabled={saving} style={S.btn('primary')}>{saving?'儲存中...':'💾 儲存報價單'}</button>
        </div>
      </Modal>

      <Modal open={orderModal} onClose={()=>setOrderModal(false)} title={editingO?'編輯訂購單':'產品訂購單'}>
        <SecTitle>收貨資訊</SecTitle>
        <Row><Field label="收貨人"><input style={S.input} value={oForm.client_name||''} onChange={e=>setOForm(f=>({...f,client_name:e.target.value}))}/></Field><Field label="聯絡人" half><input style={S.input} value={oForm.contact||''} onChange={e=>setOForm(f=>({...f,contact:e.target.value}))}/></Field></Row>
        <Row><Field label="電話" half><input style={S.input} value={oForm.phone||''} onChange={e=>setOForm(f=>({...f,phone:e.target.value}))}/></Field><Field label="E-Mail" half><input style={S.input} value={oForm.email||''} onChange={e=>setOForm(f=>({...f,email:e.target.value}))}/></Field></Row>
        <Row><Field label="收貨地址"><input style={S.input} value={oForm.address||''} onChange={e=>setOForm(f=>({...f,address:e.target.value}))}/></Field></Row>
        <Row><Field label="抬頭" half><input style={S.input} value={oForm.title||''} onChange={e=>setOForm(f=>({...f,title:e.target.value}))}/></Field><Field label="統一編號" half><input style={S.input} value={oForm.taxid||''} onChange={e=>setOForm(f=>({...f,taxid:e.target.value}))}/></Field></Row>
        <Row>
          <Field label="日期" half><input type="date" style={S.input} value={oForm.date||''} onChange={e=>setOForm(f=>({...f,date:e.target.value}))}/></Field>
          <Field label="付款方式" half><select style={S.input} value={oForm.payment||'匯款'} onChange={e=>setOForm(f=>({...f,payment:e.target.value}))}><option>匯款</option><option>月結30天</option><option>現金</option></select></Field>
        </Row>
        <Row><Field label="匯款後五碼"><input style={S.input} value={oForm.transfer_code||''} onChange={e=>setOForm(f=>({...f,transfer_code:e.target.value}))} placeholder="例如：12345" maxLength={5}/></Field></Row>
        <div style={{marginTop:16,marginBottom:10}}><SecTitle>訂購品項</SecTitle></div>
        <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr>{['品名規格','品號','序號(起)','序號(迄)','單價','數量','小計'].map(h=><th key={h} style={{textAlign:'left',padding:'7px 8px',fontSize:12,color:'var(--text2)',borderBottom:'0.5px solid var(--border2)',background:'var(--bg)',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
          <tbody>{oItems.map((item,i)=>(
            <tr key={i}>
              <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',fontSize:13,whiteSpace:'nowrap'}}>{item.name}</td>
              <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',fontSize:12,color:'var(--text2)'}}>{item.pid}</td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input placeholder="序號起" value={item.serialFrom||''} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,serialFrom:e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:90}}/></td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input placeholder="序號迄" value={item.serialTo||''} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,serialTo:e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:90}}/></td>
              <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',textAlign:'right',whiteSpace:'nowrap'}}>{fmt(item.price)}</td>
              <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.qty} min={1} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,qty:+e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:55,textAlign:'right'}}/></td>
              <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',textAlign:'right',color:'var(--text2)',whiteSpace:'nowrap'}}>{fmt((item.price||0)*(item.qty||1))}</td>
            </tr>
          ))}</tbody>
        </table>
        </div>
        <SummaryBox items={oItems}/>
        <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>
          <button onClick={()=>setOrderModal(false)} style={S.btn()}>取消</button>
          <button onClick={saveOrder} disabled={saving} style={S.btn('primary')}>{saving?'儲存中...':'💾 儲存訂購單'}</button>
        </div>
      </Modal>

      <Toast msg={toast} onClose={()=>setToast('')}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
