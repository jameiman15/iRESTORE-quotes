<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellMike 報價單管理系統</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f7f6f2;--bg2:#eeecea;--bg3:#ffffff;
  --text:#111;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-dark:#0C447C;
  --green-light:#EAF3DE;--green-dark:#27500A;
  --amber-light:#FAEEDA;--amber-dark:#633806;
  --red-light:#FCEBEB;--red-dark:#A32D2D;
  --radius:10px;--radius-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ── Supabase 設定 ──────────────────────────────────────────
const SUPABASE_URL = 'https://hpcrdguwwbrozqxbqogs.supabase.co';
const SUPABASE_KEY = 'sb_publishable__DxrAPVTE-ywf9HvuMLkNQ_syQxsxaK';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── 預設產品與組合 ────────────────────────────────────────
const DEFAULT_PRODUCTS = [
  {id:'ID-510',name:'雷射生髮帽旗艦版',price:36190,msrp:59800},
  {id:'ID-510B',name:'行動供電器(旗艦型)',price:1905,msrp:2999},
  {id:'ID-500',name:'雷射生髮帽專業型',price:28000,msrp:45000},
  {id:'ID-50004',name:'氣墊按摩梳',price:0,msrp:0},
  {id:'ID-53034',name:'愛麗朵爾白色紙袋',price:0,msrp:0},
];
const DEFAULT_COMBOS = [
  {id:'c1',name:'旗艦型套組',items:[{pid:'ID-510',qty:1},{pid:'ID-510B',qty:1},{pid:'ID-50004',qty:1},{pid:'ID-53034',qty:1}]},
  {id:'c2',name:'專業型套組 x2',items:[{pid:'ID-500',qty:2},{pid:'ID-50004',qty:1}]},
];

// ── 樣式常量 ─────────────────────────────────────────────
const S = {
  input:{padding:'8px 12px',border:'0.5px solid var(--border2)',borderRadius:8,background:'#fff',color:'var(--text)',fontSize:14,width:'100%',outline:'none'},
  btn:(variant='default')=>({
    padding:'8px 16px',borderRadius:8,border:'0.5px solid var(--border2)',
    background:variant==='primary'?'var(--blue)':variant==='danger'?'var(--red-light)':'#fff',
    color:variant==='primary'?'#fff':variant==='danger'?'var(--red-dark)':'var(--text)',
    cursor:'pointer',fontSize:13.5,display:'inline-flex',alignItems:'center',gap:6,whiteSpace:'nowrap'
  }),
  card:{background:'#fff',border:'0.5px solid var(--border)',borderRadius:14,padding:'16px 20px',marginBottom:12},
};

function fmt(n){return '$'+(n||0).toLocaleString();}
function today(){return new Date().toISOString().split('T')[0];}

// ── 小元件 ────────────────────────────────────────────────
function Badge({status}){
  const map={pending:['待確認','var(--amber-light)','var(--amber-dark)'],confirmed:['已確認','var(--blue-light)','var(--blue-dark)'],converted:['已轉訂購單','var(--green-light)','var(--green-dark)'],shipped:['已出貨','var(--green-light)','var(--green-dark)'],draft:['草稿','#F1EFE8','#444']};
  const [label,bg,color]=map[status]||['—','#eee','#555'];
  return <span style={{background:bg,color,fontSize:12,fontWeight:500,padding:'3px 10px',borderRadius:99,whiteSpace:'nowrap'}}>{label}</span>;
}

function SummaryBox({items}){
  const sub=items.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);
  const tax=Math.round(sub*0.05);
  return(
    <div style={{background:'var(--bg)',borderRadius:8,padding:'12px 16px',marginTop:10}}>
      {[['未稅金額',fmt(sub)],['稅額 (5%)',fmt(tax)],['總計',fmt(sub+tax)]].map(([l,v],i)=>(
        <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:i===2?15:13.5,fontWeight:i===2?500:400,color:i===2?'var(--text)':'var(--text2)',borderTop:i===2?'0.5px solid var(--border2)':'none',marginTop:i===2?6:0}}>
          <span>{l}</span><span>{v}</span>
        </div>
      ))}
    </div>
  );
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:200,display:'flex',alignItems:'flex-start',justifyContent:'center',overflowY:'auto',padding:'20px 12px'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'#fff',borderRadius:14,border:'0.5px solid var(--border)',width:'100%',maxWidth:680,padding:24,marginTop:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:17,fontWeight:500}}>{title}</div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,color:'var(--text2)',lineHeight:1,padding:4}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({label,children,half}){
  return(
    <div style={{display:'flex',flexDirection:'column',gap:5,flex:half?'0 0 calc(50% - 6px)':1}}>
      <label style={{fontSize:12.5,color:'var(--text2)',fontWeight:500}}>{label}</label>
      {children}
    </div>
  );
}

function Row({children}){
  return <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:12}}>{children}</div>;
}

function SectionTitle({children}){
  return <div style={{fontSize:12.5,fontWeight:600,color:'var(--text2)',marginBottom:10,paddingBottom:8,borderBottom:'0.5px solid var(--border)',letterSpacing:'0.04em',textTransform:'uppercase'}}>{children}</div>;
}

function Toast({msg,onClose}){
  useEffect(()=>{if(msg){const t=setTimeout(onClose,3000);return()=>clearTimeout(t);}},[msg]);
  if(!msg)return null;
  return <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',background:'#111',color:'#fff',padding:'10px 20px',borderRadius:99,fontSize:14,zIndex:999,whiteSpace:'nowrap'}}>{msg}</div>;
}

// ── 主應用 ────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState('quotes');
  const [products,setProducts]=useState(DEFAULT_PRODUCTS);
  const [quotes,setQuotes]=useState([]);
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState('');

  // Modal states
  const [quoteModal,setQuoteModal]=useState(false);
  const [orderModal,setOrderModal]=useState(false);
  const [editingQ,setEditingQ]=useState(null);
  const [editingO,setEditingO]=useState(null);
  const [qForm,setQForm]=useState({});
  const [qItems,setQItems]=useState([]);
  const [oForm,setOForm]=useState({});
  const [oItems,setOItems]=useState([]);
  const [selectedItem,setSelectedItem]=useState('');
  const [uploading,setUploading]=useState(false);
  const [saving,setSaving]=useState(false);

  // Search
  const [qSearch,setQSearch]=useState('');
  const [qFilter,setQFilter]=useState('');
  const [qSort,setQSort]=useState('newest');
  const [oSearch,setOSearch]=useState('');
  const [prodTab,setProdTab]=useState('products');

  const notify=(msg)=>setToast(msg);

  // ── 讀取資料 ──
  useEffect(()=>{loadAll();},[]);

  async function loadAll(){
    setLoading(true);
    try{
      const [qRes,oRes]=await Promise.all([
        sb.from('quotes').select('*').order('created_at',{ascending:false}),
        sb.from('orders').select('*').order('created_at',{ascending:false}),
      ]);
      if(qRes.data)setQuotes(qRes.data);
      if(oRes.data)setOrders(oRes.data);
    }catch(e){notify('載入失敗，請重新整理');}
    setLoading(false);
  }

  function getProduct(pid){return products.find(p=>p.id===pid)||{};}
  function getComboTotal(c){return c.items.reduce((s,i)=>s+(getProduct(i.pid).price||0)*i.qty,0);}
  function calcTotals(items){
    const sub=items.reduce((s,i)=>s+(i.price||0)*(i.qty||1),0);
    return{subtotal:sub,tax:Math.round(sub*0.05),total:sub+Math.round(sub*0.05)};
  }

  const filteredQuotes=useMemo(()=>{
    const s=qSearch.toLowerCase();
    return quotes
      .filter(q=>(!s||q.client_name?.toLowerCase().includes(s)||q.contact?.toLowerCase().includes(s)||(q.taxid||'').includes(s)||(q.notes||'').toLowerCase().includes(s))&&(!qFilter||q.status===qFilter))
      .sort((a,b)=>{
        const da=a.date||'';const db=b.date||'';
        return qSort==='oldest'?da.localeCompare(db):db.localeCompare(da);
      });
  },[quotes,qSearch,qFilter,qSort]);

  const filteredOrders=useMemo(()=>orders.filter(o=>{
    const s=oSearch.toLowerCase();
    return!s||o.client_name?.toLowerCase().includes(s)||o.id?.toLowerCase().includes(s);
  }),[orders,oSearch]);

  // ── 報價單 CRUD ──
  function openNewQuote(){
    setEditingQ(null);
    setQForm({date:today(),expiry:30,status:'pending'});
    setQItems([]);
    setQuoteModal(true);
  }

  async function openEditQuote(q){
    setEditingQ(q);
    setQForm({
      client_name:q.client_name,contact:q.contact||'',phone:q.phone||'',email:q.email||'',
      address:q.address||'',title:q.title||'',taxid:q.taxid||'',
      date:q.date,notes:q.notes||'',expiry:30,status:q.status
    });
    setQItems((q.items||[]).map(i=>({...i})));
    setQuoteModal(true);
    // 若有 PDF，自動 AI 辨識客戶資訊與品項
    if(q.pdf_url){
      setAiLoading(true);
      try{
        const [info,items]=await Promise.all([
          parseInfoFromPdf(q.pdf_url),
          parseItemsFromPdf(q.pdf_url)
        ]);
        setQForm(f=>({
          ...f,
          client_name:info.client_name||f.client_name,
          contact:info.contact||f.contact,
          phone:info.phone||f.phone,
          email:info.email||f.email,
          address:info.address||f.address,
          title:info.title||f.title||info.client_name,
          taxid:info.taxid||f.taxid,
          date:info.date||f.date,
        }));
        if(items&&items.length>0) setQItems(items);
        notify('AI 辨識完成，請確認後儲存 ✓');
      }catch(e){notify('AI 辨識失敗，請手動填寫');}
      setAiLoading(false);
    }
  }

  async function saveQuote(){
    if(!qForm.client_name){notify('請填寫診所名稱');return;}
    setSaving(true);
    const t=calcTotals(qItems);
    const payload={
      client_name:qForm.client_name,contact:qForm.contact||'',phone:qForm.phone||'',
      email:qForm.email||'',address:qForm.address||'',title:qForm.title||qForm.client_name,
      taxid:qForm.taxid||'',date:qForm.date,notes:qForm.notes||'',
      items:qItems,status:qForm.status||'pending',...t
    };
    let res;
    if(editingQ){
      res=await sb.from('quotes').update(payload).eq('id',editingQ.id).select();
    }else{
      res=await sb.from('quotes').insert(payload).select();
    }
    if(res.error){notify('儲存失敗：'+res.error.message);}
    else{notify('報價單已儲存 ✓');setQuoteModal(false);await loadAll();}
    setSaving(false);
  }

  async function deleteQuote(id){
    if(!confirm('確定刪除此報價單？'))return;
    await sb.from('quotes').delete().eq('id',id);
    notify('已刪除');
    setQuotes(qs=>qs.filter(q=>q.id!==id));
  }

  async function updateQuoteStatus(id,status){
    await sb.from('quotes').update({status}).eq('id',id);
    setQuotes(qs=>qs.map(q=>q.id===id?{...q,status}:q));
  }

  // ── 從檔名抓產品關鍵字 ──
  function parseProductFromFilename(filename){
    const keywords=['生髮帽','旗艦型','專業型','美容面罩','面罩','Elite','雷射帽','iRESTORE'];
    const found=keywords.filter(k=>filename.includes(k));
    return found.length?found.join('、'):'報價單';
  }

  // ── 從檔名解析診所名稱＋日期 ──
  function parseFilename(filename){
    const noExt=filename.replace(/\.pdf$/i,'');
    // 抓日期：20251013 or 2025_03_20 or 2025-03-20
    let date=today();
    const dm=noExt.match(/^(\d{4})[_\-]?(\d{2})[_\-]?(\d{2})/);
    if(dm) date=dm[1]+'-'+dm[2]+'-'+dm[3];
    // 移除日期後抓診所名稱
    const noDate=noExt.replace(/^\d{4}[_\-]?\d{2}[_\-]?\d{2}[\s_-]*/,'');
    const match=noDate.match(/[\u4e00-\u9fff\u3400-\u4dbf]+(?:[\s\u3000]*[\u4e00-\u9fff\u3400-\u4dbf]+)*/);
    const clinic=match?match[0].trim():'';
    return {clinic, date};
  }

  // ── 單一 PDF 上傳（掛在已有報價單上）──
  async function handlePdfUpload(e,quoteId){
    const file=e.target.files[0];if(!file)return;
    setUploading(true);
    const path=`${quoteId}/${Date.now()}.pdf`;
    const{error}=await sb.storage.from('quotes-pdf').upload(path,file,{upsert:true});
    if(error){notify('上傳失敗：'+error.message);setUploading(false);return;}
    const{data:{publicUrl}}=sb.storage.from('quotes-pdf').getPublicUrl(path);
    await sb.from('quotes').update({pdf_url:publicUrl}).eq('id',quoteId);
    setQuotes(qs=>qs.map(q=>q.id===quoteId?{...q,pdf_url:publicUrl}:q));
    notify('PDF 已上傳 ✓');
    setUploading(false);
    e.target.value='';
  }

  // ── 批次上傳（資料夾或多選）──
  const [batchProgress,setBatchProgress]=React.useState('');
  async function handleBatchUpload(e){
    const allFiles=Array.from(e.target.files).filter(f=>f.name.toLowerCase().endsWith('.pdf'));
    const files=allFiles.filter(f=>f.name.includes('報價單'));
    if(!files.length){notify('沒有找到含「報價單」的 PDF，共掃描 '+allFiles.length+' 個檔案');return;}
    notify('找到 '+files.length+' 份報價單，開始上傳...');
    setUploading(true);
    let ok=0,fail=0;
    for(let i=0;i<files.length;i++){
      const file=files[i];
      setBatchProgress('上傳中 '+(i+1)+'/'+files.length);
      const {clinic:clinicName,date:fileDate}=parseFilename(file.name);
      const tmpId='b'+Date.now()+i;
      const path=tmpId+'/'+Date.now()+'.pdf';
      const{error:upErr}=await sb.storage.from('quotes-pdf').upload(path,file,{upsert:true});
      if(upErr){fail++;continue;}
      const{data:{publicUrl}}=sb.storage.from('quotes-pdf').getPublicUrl(path);
      const{error:dbErr}=await sb.from('quotes').insert({
        client_name:clinicName,contact:'',phone:'',email:'',address:'',
        title:clinicName,taxid:'',date:today(),notes:'PDF批次匯入：'+file.name,
        items:[],subtotal:0,tax:0,total:0,status:'pending',pdf_url:publicUrl,date:fileDate
      });
      if(dbErr)fail++;else ok++;
    }
    setBatchProgress('');
    setUploading(false);
    notify('批次上傳完成：'+ok+' 份成功'+(fail?'，'+fail+' 份失敗':'')+'  ✓');
    await loadAll();
    e.target.value='';
  }

  // ── 轉訂購單 ──
  const [aiLoading,setAiLoading]=React.useState(false);

  async function convertToOrder(q){
    setEditingO(null);
    setOForm({
      client_name:q.client_name||'',
      contact:q.contact||'',
      phone:q.phone||'',
      email:q.email||'',
      address:q.address||'',
      title:q.title||q.client_name||'',
      taxid:q.taxid||'',
      date:today(),
      payment:'匯款',
      transfer_code:'',
      quote_id:q.id
    });
    // 先用已有品項帶入
    setOItems((q.items||[]).map(i=>({...i,serialFrom:'',serialTo:''})));
    setOrderModal(true);
    updateQuoteStatus(q.id,'converted');
    // 若有 PDF，呼叫 AI 辨識品項
    if(q.pdf_url){
      setAiLoading(true);
      try{
        const aiItems=await parseItemsFromPdf(q.pdf_url,q.notes||'');
        if(aiItems&&aiItems.length>0){
          setOItems(aiItems.map(i=>({...i,serialFrom:'',serialTo:''})));
          notify('AI 已自動辨識 '+aiItems.length+' 個品項 ✓');
        }
      }catch(e){notify('AI 辨識失敗，請手動填寫品項');}
      setAiLoading(false);
    }
  }

  async function pdfToBase64(pdfUrl){
    const resp=await fetch(pdfUrl);
    const blob=await resp.blob();
    return new Promise(res=>{
      const r=new FileReader();
      r.onload=()=>res(r.result.split(',')[1]);
      r.readAsDataURL(blob);
    });
  }

  async function parseItemsFromPdf(pdfUrl){
    const base64=await pdfToBase64(pdfUrl);
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'你是報價單解析助手。從報價單 PDF 中找出所有品項，回傳純 JSON 陣列，不要有任何其他文字。格式：[{"pid":"品號","name":"品名","price":單價數字,"qty":數量數字}]。如果找不到品號就用空字串。價格只填數字不含符號。',
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},
          {type:'text',text:'請解析這份報價單的品項，回傳 JSON 陣列。'}
        ]}]
      })
    });
    const data=await response.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'';
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  }

  async function parseInfoFromPdf(pdfUrl){
    const base64=await pdfToBase64(pdfUrl);
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'你是報價單解析助手。從報價單 PDF 中找出客戶資訊，回傳純 JSON 物件，不要有任何其他文字。格式：{"client_name":"診所名稱","contact":"聯絡人","phone":"電話","address":"地址","title":"抬頭","taxid":"統一編號","date":"日期YYYY-MM-DD"}。找不到的欄位填空字串。',
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},
          {type:'text',text:'請解析這份報價單的客戶資訊，回傳 JSON 物件。'}
        ]}]
      })
    });
    const data=await response.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'';
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  }

  function openEditOrder(o){
    setEditingO(o);
    setOForm({
      client_name:o.client_name,contact:o.contact,phone:o.phone,email:o.email||'',
      address:o.address,title:o.title||'',taxid:o.taxid||'',
      date:o.date,payment:o.payment,quote_id:o.quote_id
    });
    setOItems((o.items||[]).map(i=>({...i})));
    setOrderModal(true);
  }

  async function saveOrder(){
    if(!oForm.client_name){notify('請填寫收貨人');return;}
    setSaving(true);
    const t=calcTotals(oItems);
    const payload={
      client_name:oForm.client_name,contact:oForm.contact||'',phone:oForm.phone||'',
      email:oForm.email||'',address:oForm.address||'',title:oForm.title||'',
      taxid:oForm.taxid||'',date:oForm.date,
      payment:oForm.payment+(oForm.transfer_code?'（後五碼：'+oForm.transfer_code+'）':''),
      items:oItems,status:'pending',quote_id:oForm.quote_id||null,...t
    };
    let res;
    if(editingO){
      res=await sb.from('orders').update(payload).eq('id',editingO.id).select();
    }else{
      res=await sb.from('orders').insert(payload).select();
    }
    if(res.error){notify('儲存失敗：'+res.error.message);}
    else{notify('訂購單已儲存 ✓');setOrderModal(false);await loadAll();setPage('orders');}
    setSaving(false);
  }

  async function deleteOrder(id){
    if(!confirm('確定刪除此訂購單？'))return;
    await sb.from('orders').delete().eq('id',id);
    notify('已刪除');
    setOrders(os=>os.filter(o=>o.id!==id));
  }

  async function toggleOrderStatus(o){
    const ns=o.status==='shipped'?'pending':'shipped';
    await sb.from('orders').update({status:ns}).eq('id',o.id);
    setOrders(os=>os.map(x=>x.id===o.id?{...x,status:ns}:x));
  }

  // ── 組合 ──
  function applyCombo(c){
    const newItems=[...qItems];
    c.items.forEach(ci=>{
      const p=getProduct(ci.pid);
      const ex=newItems.find(i=>i.pid===ci.pid);
      if(ex)ex.qty+=ci.qty;
      else newItems.push({pid:ci.pid,name:p.name||ci.pid,price:p.price||0,qty:ci.qty});
    });
    setQItems([...newItems]);
  }

  function addSingleItem(){
    if(!selectedItem)return;
    const p=getProduct(selectedItem);
    const newItems=[...qItems];
    const ex=newItems.find(i=>i.pid===selectedItem);
    if(ex)ex.qty+=1;
    else newItems.push({pid:p.id,name:p.name,price:p.price||0,qty:1});
    setQItems([...newItems]);
    setSelectedItem('');
  }

  // ── Sidebar ──
  const navItems=[
    {id:'quotes',icon:'📄',label:'報價單'},
    {id:'orders',icon:'📋',label:'訂購單'},
    {id:'products',icon:'📦',label:'產品設定'},
  ];

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      {/* Sidebar */}
      <div style={{width:200,minWidth:200,background:'#fff',borderRight:'0.5px solid var(--border)',padding:16,display:'flex',flexDirection:'column',gap:2,position:'sticky',top:0,height:'100vh'}}>
        <div style={{fontSize:14,fontWeight:600,color:'var(--text)',padding:'8px 10px 16px',borderBottom:'0.5px solid var(--border)',marginBottom:8}}>
          WellMike<br/><span style={{fontSize:11,fontWeight:400,color:'var(--text3)'}}>報價單管理系統</span>
        </div>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,border:'none',background:page===n.id?'var(--bg)':'none',color:page===n.id?'var(--text)':'var(--text2)',fontWeight:page===n.id?500:400,fontSize:14,cursor:'pointer',textAlign:'left',width:'100%'}}>
            <span>{n.icon}</span>{n.label}
            {n.id==='quotes'&&quotes.filter(q=>q.status==='pending').length>0&&
              <span style={{marginLeft:'auto',background:'var(--blue)',color:'#fff',fontSize:11,borderRadius:99,padding:'1px 7px'}}>{quotes.filter(q=>q.status==='pending').length}</span>}
          </button>
        ))}
      </div>

      {/* Main */}
      <div style={{flex:1,padding:24,overflowY:'auto',maxWidth:900}}>
        {loading&&<div style={{padding:60,textAlign:'center',color:'var(--text3)'}}>載入中...</div>}

        {/* ── 報價單頁 ── */}
        {!loading&&page==='quotes'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
              <div style={{fontSize:20,fontWeight:500}}>報價單管理</div>
              <button onClick={openNewQuote} style={S.btn('primary')}>＋ 新增報價單</button>
            </div>

            {/* 搜尋 */}
            <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
              <input value={qSearch} onChange={e=>setQSearch(e.target.value)} placeholder="搜尋診所名稱、聯絡人、統編..." style={{...S.input,flex:1,minWidth:200}}/>
              <select value={qFilter} onChange={e=>setQFilter(e.target.value)} style={{...S.input,width:'auto'}}>
                <option value="">全部狀態</option>
                <option value="pending">待確認</option>
                <option value="confirmed">已確認</option>
                <option value="converted">已轉訂購單</option>
              </select>
              <select value={qSort} onChange={e=>setQSort(e.target.value)} style={{...S.input,width:'auto'}}>
                <option value="newest">最新優先</option>
                <option value="oldest">最舊優先</option>
              </select>
            </div>

            {/* 批次上傳區 */}
            <div style={{border:'1.5px dashed var(--border2)',borderRadius:12,padding:'20px',textAlign:'center',marginBottom:18,background:'#fff'}}>
              <div style={{fontSize:26,marginBottom:8}}>{uploading?'⏳':'📤'}</div>
              <div style={{fontWeight:500,color:'var(--text)',marginBottom:4}}>{batchProgress||'批次上傳報價單 PDF'}</div>
              <div style={{fontSize:12.5,color:'var(--text2)',marginBottom:14}}>只有檔名含「報價單」的 PDF 才會匯入，自動辨識診所名稱與日期</div>
              <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
                <label style={{...S.btn('primary'),cursor:'pointer'}}>
                  <input type="file" accept=".pdf" multiple style={{display:'none'}} onChange={handleBatchUpload} disabled={uploading}/>
                  📄 選擇多個檔案
                </label>
                <label style={{...S.btn(),cursor:'pointer'}}>
                  <input type="file" accept=".pdf" webkitdirectory style={{display:'none'}} onChange={handleBatchUpload} disabled={uploading}/>
                  📁 選擇整個資料夾
                </label>
              </div>
            </div>

            {filteredQuotes.length===0?(
              <div style={{padding:40,textAlign:'center',color:'var(--text3)'}}>尚無報價單</div>
            ):filteredQuotes.map(q=>(
              <div key={q.id} style={S.card}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,gap:10}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:15}}>{q.client_name}</div>
                    <div style={{fontSize:13,color:'var(--text2)',marginTop:3}}>
                      {q.contact&&`聯絡人：${q.contact}　`}{q.phone&&`${q.phone}　`}{q.taxid&&`統編：${q.taxid}`}
                    </div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <Badge status={q.status}/>
                    <div style={{fontSize:12,color:'var(--text3)',marginTop:5}}>📅 {q.date}</div>
                  </div>
                </div>
                <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>
                  總計：<strong>{fmt(q.total)}</strong>　{(q.items||[]).length} 項
                  {q.pdf_url&&<a href={q.pdf_url} target="_blank" style={{marginLeft:12,color:'var(--blue)',fontSize:12}}>📎 查看PDF</a>}
                </div>
                {q.notes&&<div style={{fontSize:12.5,color:'var(--text3)',marginBottom:8,background:'var(--bg)',borderRadius:6,padding:'5px 10px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>📄 {q.notes}</div>}
                <div style={{display:'flex',gap:8,paddingTop:10,borderTop:'0.5px solid var(--border)',flexWrap:'wrap'}}>
                  <button onClick={()=>openEditQuote(q)} style={S.btn()}>✏️ 編輯</button>
                  {q.status!=='converted'&&<button onClick={()=>convertToOrder(q)} style={S.btn('primary')}>→ 轉訂購單</button>}
                  {q.status==='pending'&&<button onClick={()=>updateQuoteStatus(q.id,'confirmed')} style={S.btn()}>✓ 確認</button>}
                  <label style={{...S.btn(),cursor:'pointer'}}>
                    <input type="file" accept=".pdf" style={{display:'none'}} onChange={e=>handlePdfUpload(e,q.id)}/>
                    📎 上傳PDF
                  </label>
                  <button onClick={()=>deleteQuote(q.id)} style={S.btn('danger')}>🗑</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── 訂購單頁 ── */}
        {!loading&&page==='orders'&&(
          <div>
            <div style={{fontSize:20,fontWeight:500,marginBottom:20}}>訂購單管理</div>
            <input value={oSearch} onChange={e=>setOSearch(e.target.value)} placeholder="搜尋診所名稱..." style={{...S.input,marginBottom:16}}/>
            {filteredOrders.length===0?(
              <div style={{padding:40,textAlign:'center',color:'var(--text3)'}}>尚無訂購單</div>
            ):filteredOrders.map(o=>(
              <div key={o.id} style={S.card}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,gap:10}}>
                  <div>
                    <div style={{fontWeight:500,fontSize:15}}>{o.client_name}</div>
                    <div style={{fontSize:13,color:'var(--text2)',marginTop:3}}>
                      {o.contact&&`${o.contact}　`}{o.taxid&&`統編：${o.taxid}　`}付款：{o.payment}
                    </div>
                  </div>
                  <div style={{textAlign:'right',flexShrink:0}}>
                    <Badge status={o.status}/>
                    <div style={{fontSize:12,color:'var(--text3)',marginTop:5}}>{o.date}</div>
                  </div>
                </div>
                <div style={{fontSize:13,color:'var(--text2)',marginBottom:10}}>
                  總計：<strong>{fmt(o.total)}</strong>　{(o.items||[]).length} 項
                </div>
                <div style={{display:'flex',gap:8,paddingTop:10,borderTop:'0.5px solid var(--border)',flexWrap:'wrap'}}>
                  <button onClick={()=>openEditOrder(o)} style={S.btn()}>✏️ 編輯</button>
                  <button onClick={()=>toggleOrderStatus(o)} style={S.btn(o.status==='shipped'?'':'primary')}>
                    {o.status==='shipped'?'↩ 改待出貨':'✓ 標記出貨'}
                  </button>
                  <button onClick={()=>deleteOrder(o.id)} style={S.btn('danger')}>🗑</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── 產品設定頁 ── */}
        {!loading&&page==='products'&&(
          <div>
            <div style={{fontSize:20,fontWeight:500,marginBottom:20}}>產品與組合設定</div>
            <div style={{display:'flex',gap:2,marginBottom:20,borderBottom:'0.5px solid var(--border)'}}>
              {[['products','產品項目'],['combos','銷售組合']].map(([id,label])=>(
                <button key={id} onClick={()=>setProdTab(id)} style={{padding:'9px 20px',border:'none',background:'none',cursor:'pointer',fontSize:14,color:prodTab===id?'var(--blue)':'var(--text2)',fontWeight:prodTab===id?500:400,borderBottom:prodTab===id?'2px solid var(--blue)':'2px solid transparent',marginBottom:-0.5}}>
                  {label}
                </button>
              ))}
            </div>
            {prodTab==='products'&&(
              <div>
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
                  <button onClick={()=>setProducts(ps=>[...ps,{id:'',name:'',price:0,msrp:0}])} style={S.btn()}>＋ 新增</button>
                </div>
                <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5}}>
                  <thead>
                    <tr>{['品號','品名','建議售價','進貨價(未稅)',''].map(h=>(
                      <th key={h} style={{textAlign:'left',padding:'8px 10px',fontSize:12,color:'var(--text2)',borderBottom:'0.5px solid var(--border2)',background:'var(--bg)',whiteSpace:'nowrap'}}>{h}</th>
                    ))}</tr>
                  </thead>
                  <tbody>
                    {products.map((p,i)=>(
                      <tr key={i}>
                        {['id','name','msrp','price'].map(f=>(
                          <td key={f} style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}>
                            <input value={p[f]} type={f==='msrp'||f==='price'?'number':'text'} onChange={e=>setProducts(ps=>ps.map((x,j)=>j===i?{...x,[f]:f==='msrp'||f==='price'?+e.target.value:e.target.value}:x))} style={{...S.input,padding:'6px 8px',textAlign:f==='msrp'||f==='price'?'right':'left'}}/>
                          </td>
                        ))}
                        <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}>
                          <button onClick={()=>setProducts(ps=>ps.filter((_,j)=>j!==i))} style={S.btn('danger')}>🗑</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                </div>
              </div>
            )}
            {prodTab==='combos'&&(
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:14}}>
                {DEFAULT_COMBOS.map(c=>(
                  <div key={c.id} style={{background:'#fff',border:'0.5px solid var(--border)',borderRadius:12,padding:18}}>
                    <div style={{fontWeight:500,fontSize:14.5,marginBottom:8}}>📦 {c.name}</div>
                    <div style={{fontSize:12.5,color:'var(--text2)',marginBottom:12,lineHeight:1.8}}>
                      {c.items.map((it,idx)=><div key={idx}>{getProduct(it.pid).name||it.pid} ×{it.qty}</div>)}
                    </div>
                    <div style={{fontSize:17,fontWeight:500,color:'var(--blue)'}}>{fmt(getComboTotal(c))} <span style={{fontSize:11,fontWeight:400,color:'var(--text3)'}}>未稅</span></div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── 報價單 Modal ── */}
      <Modal open={quoteModal} onClose={()=>setQuoteModal(false)} title={editingQ?(aiLoading?'編輯報價單　⏳ AI 辨識中...':'編輯報價單'):'新增報價單'}>
        <SectionTitle>客戶資訊</SectionTitle>
        <Row>
          <Field label="診所名稱"><input style={S.input} value={qForm.client_name||''} onChange={e=>setQForm(f=>({...f,client_name:e.target.value}))}/></Field>
          <Field label="聯絡人" half><input style={S.input} value={qForm.contact||''} onChange={e=>setQForm(f=>({...f,contact:e.target.value}))}/></Field>
        </Row>
        <Row>
          <Field label="電話" half><input style={S.input} value={qForm.phone||''} onChange={e=>setQForm(f=>({...f,phone:e.target.value}))}/></Field>
          <Field label="E-Mail" half><input style={S.input} value={qForm.email||''} onChange={e=>setQForm(f=>({...f,email:e.target.value}))}/></Field>
        </Row>
        <Row><Field label="地址"><input style={S.input} value={qForm.address||''} onChange={e=>setQForm(f=>({...f,address:e.target.value}))}/></Field></Row>
        <Row>
          <Field label="抬頭" half><input style={S.input} value={qForm.title||''} onChange={e=>setQForm(f=>({...f,title:e.target.value}))}/></Field>
          <Field label="統一編號" half><input style={S.input} value={qForm.taxid||''} onChange={e=>setQForm(f=>({...f,taxid:e.target.value}))}/></Field>
        </Row>
        <Row>
          <Field label="報價日期" half><input type="date" style={S.input} value={qForm.date||''} onChange={e=>setQForm(f=>({...f,date:e.target.value}))}/></Field>
          <Field label="狀態" half>
            <select style={S.input} value={qForm.status||'pending'} onChange={e=>setQForm(f=>({...f,status:e.target.value}))}>
              <option value="pending">待確認</option>
              <option value="confirmed">已確認</option>
              <option value="converted">已轉訂購單</option>
            </select>
          </Field>
        </Row>

        <div style={{marginTop:16,marginBottom:12}}><SectionTitle>選擇組合或單品</SectionTitle></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          {DEFAULT_COMBOS.map(c=>(
            <div key={c.id} onClick={()=>applyCombo(c)} style={{background:'var(--bg)',border:'0.5px solid var(--border2)',borderRadius:10,padding:14,cursor:'pointer'}}>
              <div style={{fontWeight:500,fontSize:13.5,marginBottom:6}}>📦 {c.name}</div>
              <div style={{fontSize:12,color:'var(--text2)',marginBottom:8,lineHeight:1.7}}>
                {c.items.map((it,idx)=><div key={idx}>{getProduct(it.pid).name||it.pid} ×{it.qty}</div>)}
              </div>
              <div style={{fontSize:15,fontWeight:500,color:'var(--blue)'}}>{fmt(getComboTotal(c))}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:10,marginBottom:16}}>
          <select value={selectedItem} onChange={e=>setSelectedItem(e.target.value)} style={{...S.input,flex:1}}>
            <option value="">— 選擇單品加入 —</option>
            {products.map(p=><option key={p.id} value={p.id}>{p.name} ({fmt(p.price)})</option>)}
          </select>
          <button onClick={addSingleItem} style={S.btn()}>＋ 加入</button>
        </div>

        <SectionTitle>報價品項</SectionTitle>
        <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13.5,marginBottom:4}}>
          <thead>
            <tr>{['品名','品號','單價','數量','小計',''].map(h=>(
              <th key={h} style={{textAlign:'left',padding:'7px 8px',fontSize:12,color:'var(--text2)',borderBottom:'0.5px solid var(--border2)',background:'var(--bg)',whiteSpace:'nowrap'}}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {qItems.map((item,i)=>(
              <tr key={i}>
                <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={item.name} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,name:e.target.value}:x))} style={{...S.input,padding:'5px 8px'}}/></td>
                <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input value={item.pid} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,pid:e.target.value}:x))} style={{...S.input,padding:'5px 8px',fontSize:12,width:90}}/></td>
                <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.price} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,price:+e.target.value}:x))} style={{...S.input,padding:'5px 8px',textAlign:'right',width:90}}/></td>
                <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.qty} min={1} onChange={e=>setQItems(its=>its.map((x,j)=>j===i?{...x,qty:+e.target.value}:x))} style={{...S.input,padding:'5px 8px',textAlign:'right',width:60}}/></td>
                <td style={{padding:'5px 8px',borderBottom:'0.5px solid var(--border)',textAlign:'right',color:'var(--text2)',whiteSpace:'nowrap'}}>{fmt((item.price||0)*(item.qty||1))}</td>
                <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><button onClick={()=>setQItems(its=>its.filter((_,j)=>j!==i))} style={{...S.btn('danger'),padding:'4px 8px'}}>🗑</button></td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
        <SummaryBox items={qItems}/>

        <div style={{marginTop:14}}>
          <Field label="備註">
            <textarea style={{...S.input,minHeight:70,resize:'vertical'}} value={qForm.notes||''} onChange={e=>setQForm(f=>({...f,notes:e.target.value}))}/>
          </Field>
        </div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>
          <button onClick={()=>setQuoteModal(false)} style={S.btn()}>取消</button>
          <button onClick={saveQuote} disabled={saving} style={S.btn('primary')}>{saving?'儲存中...':'💾 儲存報價單'}</button>
        </div>
      </Modal>

      {/* ── 訂購單 Modal ── */}
      <Modal open={orderModal} onClose={()=>setOrderModal(false)} title={editingO?'編輯訂購單':'產品訂購單'}>
        <SectionTitle>收貨資訊（由報價單帶入）</SectionTitle>
        <Row>
          <Field label="收貨人"><input style={S.input} value={oForm.client_name||''} onChange={e=>setOForm(f=>({...f,client_name:e.target.value}))}/></Field>
          <Field label="聯絡人" half><input style={S.input} value={oForm.contact||''} onChange={e=>setOForm(f=>({...f,contact:e.target.value}))}/></Field>
        </Row>
        <Row>
          <Field label="電話" half><input style={S.input} value={oForm.phone||''} onChange={e=>setOForm(f=>({...f,phone:e.target.value}))}/></Field>
          <Field label="E-Mail" half><input style={S.input} value={oForm.email||''} onChange={e=>setOForm(f=>({...f,email:e.target.value}))}/></Field>
        </Row>
        <Row><Field label="收貨地址"><input style={S.input} value={oForm.address||''} onChange={e=>setOForm(f=>({...f,address:e.target.value}))}/></Field></Row>
        <Row>
          <Field label="抬頭" half><input style={S.input} value={oForm.title||''} onChange={e=>setOForm(f=>({...f,title:e.target.value}))}/></Field>
          <Field label="統一編號" half><input style={S.input} value={oForm.taxid||''} onChange={e=>setOForm(f=>({...f,taxid:e.target.value}))}/></Field>
        </Row>
        <Row>
          <Field label="日期" half><input type="date" style={S.input} value={oForm.date||''} onChange={e=>setOForm(f=>({...f,date:e.target.value}))}/></Field>
          <Field label="付款方式" half>
            <select style={S.input} value={oForm.payment||'匯款'} onChange={e=>setOForm(f=>({...f,payment:e.target.value}))}>
              <option>匯款</option><option>月結30天</option><option>現金</option>
            </select>
          </Field>
        </Row>
        <Row>
          <Field label="匯款後五碼"><input style={S.input} value={oForm.transfer_code||''} onChange={e=>setOForm(f=>({...f,transfer_code:e.target.value}))} placeholder="例如：12345" maxLength={5}/></Field>
        </Row>

        <div style={{marginTop:16,marginBottom:10}}>
          <SectionTitle>訂購品項 {aiLoading&&<span style={{fontSize:12,fontWeight:400,color:'var(--blue)'}}>⏳ AI 辨識中...</span>}</SectionTitle>
        </div>
        <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'auto'}}>
          <thead>
            <tr>{['品名規格','品號','序號(起)','序號(迄)','單價','數量','小計'].map(h=>(
              <th key={h} style={{textAlign:'left',padding:'7px 8px',fontSize:12,color:'var(--text2)',borderBottom:'0.5px solid var(--border2)',background:'var(--bg)',whiteSpace:'nowrap'}}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {oItems.map((item,i)=>(
              <tr key={i}>
                <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',fontSize:13,whiteSpace:'nowrap'}}>{item.name}</td>
                <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',fontSize:12,color:'var(--text2)'}}>{item.pid}</td>
                <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input placeholder="序號起" value={item.serialFrom||''} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,serialFrom:e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:90}}/></td>
                <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input placeholder="序號迄" value={item.serialTo||''} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,serialTo:e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:90}}/></td>
                <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',textAlign:'right',whiteSpace:'nowrap'}}>{fmt(item.price)}</td>
                <td style={{padding:'5px 6px',borderBottom:'0.5px solid var(--border)'}}><input type="number" value={item.qty} min={1} onChange={e=>setOItems(its=>its.map((x,j)=>j===i?{...x,qty:+e.target.value}:x))} style={{...S.input,padding:'5px 7px',width:55,textAlign:'right'}}/></td>
                <td style={{padding:'6px 8px',borderBottom:'0.5px solid var(--border)',textAlign:'right',color:'var(--text2)',whiteSpace:'nowrap'}}>{fmt((item.price||0)*(item.qty||1))}</td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
        <SummaryBox items={oItems}/>

        <div style={{display:'flex',justifyContent:'flex-end',gap:10,marginTop:20}}>
          <button onClick={()=>setOrderModal(false)} style={S.btn()}>取消</button>
          <button onClick={saveOrder} disabled={saving} style={S.btn('primary')}>{saving?'儲存中...':'💾 儲存訂購單'}</button>
        </div>
      </Modal>

      <Toast msg={toast} onClose={()=>setToast('')}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
